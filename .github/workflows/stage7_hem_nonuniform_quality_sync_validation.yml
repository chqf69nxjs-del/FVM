name: Stage 7 HEM Nonuniform Quality Sync Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-nonuniform-quality-sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.head_ref == 'agent/stage7-lco2-hem-nonuniform-quality-sync'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[coolprop,plotting]" pytest

      - name: Run focused HEM tests
        run: |
          python -m pytest -q \
            tests/test_stage7_lco2_hem_equilibrium_quality_sync.py \
            tests/test_stage7_lco2_hem_nonuniform_quality_sync.py \
            tests/test_stage7_lco2_hem_uniform_state_preservation.py \
            --junitxml=stage7_hem_nonuniform_quality_sync_focused.xml

      - name: Run fixed nonuniform HEM case
        run: |
          python -m liquid_gas_transient.hem_nonuniform_quality_sync \
            --output-dir artifacts/stage7_lco2_hem_nonuniform_quality_sync

      - name: Run full repository suite
        run: |
          python -m pytest -q \
            --junitxml=stage7_hem_nonuniform_quality_sync_full.xml

      - name: Check committed diff
        run: |
          git diff --check origin/main...HEAD

      - name: Check tracked files unchanged
        run: |
          test -z "$(git status --porcelain --untracked-files=no)"

      - name: Upload nonuniform HEM evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage7-hem-nonuniform-quality-sync-validation
          path: |
            stage7_hem_nonuniform_quality_sync_focused.xml
            stage7_hem_nonuniform_quality_sync_full.xml
            artifacts/stage7_lco2_hem_nonuniform_quality_sync
          if-no-files-found: warn
