name: V-012D Apply Local Payload

on:
  push:
    branches:
      - agent/stage6-v012d-closing-ramp

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage6-v012d-closing-ramp
          fetch-depth: 0
      - name: Verify and apply local payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/v012d_payload/chunk_*.txt > "$RUNNER_TEMP/v012d-code.b64"
          echo "29ee21e9c718be6b4c0b0db3e30a263a753ff0731f2d38cac427da0f1caeaafd  $RUNNER_TEMP/v012d-code.b64" | sha256sum -c -
          base64 --decode "$RUNNER_TEMP/v012d-code.b64" > "$RUNNER_TEMP/v012d-code.tar.gz"
          echo "7bc665bce8574f85afb5060d3aff15eff6850a4772981e3d5676487717a3cc37  $RUNNER_TEMP/v012d-code.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/v012d-code.tar.gz" -C .
          rm -rf .github/v012d_payload
          rm -f .github/workflows/v012d-apply-local-payload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/v012d_payload \
            .github/workflows/v012d-apply-local-payload.yml \
            src/liquid_gas_transient/cases/internal_valve_closing_ramp_config.py \
            src/liquid_gas_transient/cases/coolprop_internal_valve_closing_ramp.py \
            src/liquid_gas_transient/cases/coolprop_internal_valve_closing_ramp_artifacts.py \
            src/liquid_gas_transient/plot_internal_valve_closing_ramp_results.py \
            tests/test_coolprop_internal_valve_closing_ramp.py \
            tests/test_coolprop_internal_valve_closing_ramp_plots.py
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No payload changes to commit."
            exit 0
          fi
          git commit -m "Add V-012D controlled closing ramp"
          git push origin HEAD:agent/stage6-v012d-closing-ramp
