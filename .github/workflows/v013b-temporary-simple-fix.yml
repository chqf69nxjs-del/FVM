name: V-013B Simple Metric Fix

on:
  pull_request:
  push:
    branches:
      - agent/stage7-v013b-rigid-wall-reflection

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v7
        with:
          ref: agent/stage7-v013b-rigid-wall-reflection
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" "matplotlib>=3.7"

      - name: Apply reviewed source fixes
        run: |
          python scripts/v013b_apply_metric_fix.py
          git diff --check

      - name: Run focused checks
        run: |
          python -m pytest -q \
            tests/test_linear_acoustic_reference.py \
            tests/test_v013_rigid_wall_reflection.py \
            tests/test_v013_rigid_wall_observation.py \
            --strict-markers

      - name: Commit and push when changed
        run: |
          if git diff --quiet; then
            echo "V-013B metric fixes are already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/liquid_gas_transient/cases/v013_rigid_wall_observation.py \
            src/liquid_gas_transient/plot_v013_rigid_wall_results.py \
            tests/test_v013_rigid_wall_observation.py
          git commit -m "[v013b-metric-fix] Fix reflection metric normalization and plots"
          git push origin HEAD:agent/stage7-v013b-rigid-wall-reflection
