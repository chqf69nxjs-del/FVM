name: Stage 7 Liquid State Pair Survey Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage7-liquid-state-pair-survey-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-state-pair-survey:
    name: validate-liquid-state-pair-survey
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[plotting]"
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check environment
        run: |
          python - <<'PY'
          import sys
          import CoolProp
          import numpy as np

          print("Python:", sys.version)
          print("NumPy:", np.__version__)
          print("CoolProp:", CoolProp.__version__)
          assert CoolProp.__version__ == "8.0.0"
          PY

      - name: Static and diff checks
        run: |
          python -m compileall -q src/liquid_gas_transient
          git diff --check origin/main...HEAD

      - name: Run state-pair survey focused tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_state_pair_survey.py \
            --strict-markers \
            --junitxml=artifacts/stage7-state-pair-survey-focused-junit.xml

      - name: Assert installed CoolProp tests were not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          path = "artifacts/stage7-state-pair-survey-focused-junit.xml"
          root = ET.parse(path).getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(
              f"testcases={len(testcases)} skipped={len(skipped)} "
              f"failures={len(failures)} errors={len(errors)}"
          )
          assert len(testcases) >= 18
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Run fixed CoolProp state-pair survey
        run: |
          python -m liquid_gas_transient.hem_liquid_to_two_phase_state_pair_survey \
            --output-dir artifacts/state-pair-survey

      - name: Validate survey evidence flags
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "artifacts/state-pair-survey/"
              "stage7_lco2_hem_liquid_state_pair_survey.json"
          )
          payload = json.loads(path.read_text(encoding="utf-8"))

          assert payload["scope"] == "verification_only"
          assert payload["screening_is_fvm_solution"] is False
          assert payload["fvm_step_exercised"] is False
          assert payload["case_a_frozen"] is False
          assert payload["case_b_frozen"] is False
          assert payload["algorithms_or_tolerances_tuned"] is False
          assert payload["production_hem_activation_approved"] is False
          assert payload["physical_validation"] is False
          assert payload["design_use_acceptance"] is False
          assert payload["candidate_count"] >= 5
          assert payload["pair_count"] >= 4

          print(json.dumps({
              "candidate_count": payload["candidate_count"],
              "accepted_liquid_candidate_count": payload[
                  "accepted_liquid_candidate_count"
              ],
              "candidate_status_counts": payload["candidate_status_counts"],
              "pair_outcome_counts": payload["pair_outcome_counts"],
              "promising_pair_ids": payload["promising_pair_ids"],
              "highest_quality_pair_id": payload["highest_quality_pair_id"],
              "highest_screened_equilibrium_quality": payload[
                  "highest_screened_equilibrium_quality"
              ],
          }, indent=2))
          PY

      - name: Run related Stage 7 HEM tests
        run: |
          python -m pytest -q \
            tests/test_stage7_lco2_hem_phase_classification.py \
            tests/test_stage7_lco2_hem_equilibrium_sound_speed.py \
            tests/test_stage7_lco2_hem_uniform_state_preservation.py \
            tests/test_stage7_lco2_hem_equilibrium_quality_sync.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_crossing.py \
            tests/test_stage7_lco2_hem_mixed_liquid_open_two_phase_eos.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_state_pair_survey.py \
            --strict-markers \
            --junitxml=artifacts/stage7-state-pair-survey-related-junit.xml

      - name: Run full repository tests
        run: |
          python -m pytest -q \
            --strict-markers \
            --junitxml=artifacts/stage7-state-pair-survey-full-junit.xml

      - name: Write validation summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          lines = ["# Stage 7 Liquid State-Pair Survey Validation", ""]
          for label, path in (
              (
                  "focused",
                  Path("artifacts/stage7-state-pair-survey-focused-junit.xml"),
              ),
              (
                  "related",
                  Path("artifacts/stage7-state-pair-survey-related-junit.xml"),
              ),
              (
                  "full",
                  Path("artifacts/stage7-state-pair-survey-full-junit.xml"),
              ),
          ):
              if not path.exists():
                  lines.append(f"- {label}: artifact not produced")
                  continue
              root = ET.parse(path).getroot()
              testcases = root.findall(".//testcase")
              skipped = root.findall(".//skipped")
              failures = root.findall(".//failure")
              errors = root.findall(".//error")
              lines.append(
                  f"- {label}: tests={len(testcases)}, skipped={len(skipped)}, "
                  f"failures={len(failures)}, errors={len(errors)}"
              )

          survey = Path(
              "artifacts/state-pair-survey/"
              "stage7_lco2_hem_liquid_state_pair_survey.json"
          )
          if survey.exists():
              payload = json.loads(survey.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      "",
                      f"- candidates: {payload['candidate_count']}",
                      f"- accepted liquid: {payload['accepted_liquid_candidate_count']}",
                      f"- pairs: {payload['pair_count']}",
                      f"- promising pairs: {payload['promising_pair_ids']}",
                      (
                          "- highest screened q: "
                          f"{payload['highest_screened_equilibrium_quality']}"
                      ),
                  ]
              )

          lines.extend(
              [
                  "",
                  "Verification-only property screening. No FVM crossing, production, "
                  "Validation, acoustic-band, or design-use approval.",
              ]
          )
          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(lines),
              encoding="utf-8",
          )
          PY

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stage7-state-pair-survey-validation-${{ github.run_id }}
          path: artifacts
          if-no-files-found: warn
          retention-days: 14
