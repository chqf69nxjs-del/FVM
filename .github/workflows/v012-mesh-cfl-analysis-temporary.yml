name: V-012 Mesh CFL Analysis Temporary

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install verification dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" matplotlib

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run focused mesh/CFL tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_internal_valve_mesh_cfl_sweep.py \
            tests/test_internal_valve_mesh_cfl_analysis.py \
            tests/test_internal_valve_mesh_cfl_plots.py \
            --junitxml=artifacts/v012-mesh-cfl-focused-junit.xml

      - name: Run complete 13-case V-012 sweep
        run: |
          set -o pipefail
          python -m liquid_gas_transient.cases.coolprop_internal_valve_mesh_cfl_sweep \
            artifacts/internal_valve_mesh_cfl_sweep \
            2>&1 | tee artifacts/v012-mesh-cfl-sweep.txt

      - name: Generate comparison plots from saved artifacts
        run: |
          python -m liquid_gas_transient.plot_internal_valve_mesh_cfl_results \
            artifacts/internal_valve_mesh_cfl_sweep

      - name: Validate aggregate observation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          directory = Path("artifacts/internal_valve_mesh_cfl_sweep")
          metrics_path = directory / (
              "v012_internal_valve_mesh_cfl_sweep_metrics.json"
          )
          manifest_path = directory / (
              "v012_internal_valve_mesh_cfl_sweep_plot_manifest.json"
          )
          metrics = json.loads(metrics_path.read_text(encoding="utf-8"))
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          assert metrics["planned_run_count"] == 13
          assert metrics["executed_run_count"] == 13
          assert metrics["partial_execution"] is False
          assert metrics["overall_selected_execution_pass"] is True
          assert metrics["overall_sweep_execution_pass"] is True
          assert metrics["aggregate_trend_analysis_complete"] is True
          assert metrics["comparison_plots_complete"] is True
          assert metrics["property_backend_design_status"] == (
              "not_approved_for_design_use"
          )
          assert metrics["finest_mesh_is_exact_solution"] is False
          assert metrics["lower_cfl_is_truth"] is False
          assert len(metrics["summary_rows"]) == 13
          assert all(
              row["analysis_complete"] is True
              for row in metrics["summary_rows"]
          )
          assert manifest["plot_count"] == 9
          assert manifest["solver_rerun"] is False
          assert manifest["numerical_results_changed"] is False
          print(json.dumps(metrics["aggregate_observation"], indent=2))
          print(json.dumps(manifest, indent=2))
          PY

      - name: Run full repository tests
        run: |
          set -o pipefail
          python -m pytest -q --tb=short \
            --junitxml=artifacts/full-repository-junit.xml \
            2>&1 | tee artifacts/full-repository-tests.txt

      - name: Upload temporary verification artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v012-mesh-cfl-full-${{ github.sha }}
          path: artifacts
          if-no-files-found: error
          retention-days: 14
