name: V-012 Mesh CFL Analysis Temporary

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install verification dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" matplotlib

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run focused mesh/CFL analysis tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_internal_valve_mesh_cfl_sweep.py \
            tests/test_internal_valve_mesh_cfl_analysis.py \
            --junitxml=artifacts/v012-mesh-cfl-analysis-junit.xml

      - name: Run four-case V-012 analysis mini sweep
        run: |
          python -m liquid_gas_transient.cases.coolprop_internal_valve_mesh_cfl_sweep \
            artifacts/internal_valve_mesh_cfl_analysis_mini \
            --case-id v012a_n0050_cfl0p5 \
            --case-id v012b_n0050_cfl0p5 \
            --case-id v012c_n0050_cfl0p5 \
            --case-id v012d_n0050_cfl0p5

      - name: Validate dynamic extraction
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "artifacts/internal_valve_mesh_cfl_analysis_mini/"
              "v012_internal_valve_mesh_cfl_sweep_metrics.json"
          )
          metrics = json.loads(path.read_text(encoding="utf-8"))
          assert metrics["planned_run_count"] == 13
          assert metrics["executed_run_count"] == 4
          assert metrics["partial_execution"] is True
          assert metrics["overall_selected_execution_pass"] is True
          assert metrics["overall_sweep_execution_pass"] is False
          rows = {row["verification_item"]: row for row in metrics["summary_rows"]}
          assert set(rows) == {"V-012A", "V-012B", "V-012C", "V-012D"}
          assert rows["V-012A"]["analysis_complete"] is True
          for item in ("V-012B", "V-012C", "V-012D"):
              assert rows[item]["analysis_complete"] is True
              assert rows[item]["near_probe_characteristic_direction_pass"] is True
              assert rows[item]["near_left_p50_time_s"] is not None
              assert rows[item]["near_right_p50_time_s"] is not None
          assert rows["V-012D"][
              "finite_opening_momentum_relation_applied_to_closed_rows_extracted"
          ] is False
          print(json.dumps(metrics, indent=2))
          PY

      - name: Run full repository tests
        run: |
          set -o pipefail
          python -m pytest -q --tb=short \
            --junitxml=artifacts/full-repository-junit.xml \
            2>&1 | tee artifacts/full-repository-tests.txt

      - name: Upload temporary verification artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v012-mesh-cfl-analysis-${{ github.sha }}
          path: artifacts
          if-no-files-found: error
          retention-days: 14
