name: V-013 Reference Core Temporary

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" matplotlib

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run V-013 reference-core self-tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_linear_acoustic_reference.py \
            --junitxml=artifacts/v013-reference-core-junit.xml

      - name: Exercise deterministic reference artifact
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          import numpy as np
          from liquid_gas_transient.verification.linear_acoustic_reference import (
              LinearAcousticReferenceConfig,
              run_moc_reference,
              write_moc_reference_json,
          )

          root = Path("artifacts/reference-core")
          config = LinearAcousticReferenceConfig(
              p0_pa=8.0e6,
              rho0_kg_m3=900.0,
              c0_m_s=500.0,
              length_m=4.0,
              n_cells=4,
              right_boundary="rigid_wall",
          )
          initial_plus = np.array([0.0, 1.0, 2.0, 3.0, 0.0])
          initial_minus = np.zeros(5)
          history = run_moc_reference(
              config,
              initial_a_plus_pa=initial_plus,
              initial_a_minus_pa=initial_minus,
              n_steps=2,
          )
          first = write_moc_reference_json(
              root / "first.json",
              config=config,
              history=history,
          )
          second = write_moc_reference_json(
              root / "second.json",
              config=config,
              history=history,
          )
          assert first.read_bytes() == second.read_bytes()
          digest = hashlib.sha256(first.read_bytes()).hexdigest()
          (root / "sha256.txt").write_text(digest + "\n", encoding="utf-8")
          print("deterministic sha256:", digest)
          PY

      - name: Run full repository tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --tb=short \
            --junitxml=artifacts/full-repository-junit.xml \
            2>&1 | tee artifacts/full-repository-tests.txt

      - name: Upload temporary diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v013-reference-core-${{ github.sha }}
          path: artifacts
          if-no-files-found: error
          retention-days: 14
