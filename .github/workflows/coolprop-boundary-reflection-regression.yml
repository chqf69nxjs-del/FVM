name: CoolProp Boundary Reflection Regression

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coolprop-boundary-reflection-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundary-reflection-regression:
    name: boundary-reflection-regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check CoolProp environment
        run: |
          python - <<'PY'
          import math
          import CoolProp
          import CoolProp.CoolProp as CP

          rho = CP.PropsSI("D", "P", 8.0e6, "T", 280.0, "CO2")
          print("CoolProp:", CoolProp.__version__)
          print("CO2 density smoke kg/m3:", rho)
          assert CoolProp.__version__ == "8.0.0"
          assert math.isfinite(rho) and rho > 0.0
          PY

      - name: Run Stage 5 pure tests
        run: |
          python -m pytest -q \
            tests/test_verification_import_order.py \
            tests/test_boundary_reflection_verification_report.py

      - name: Run installed CoolProp Stage 5 regression test
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_boundary_reflection_regression.py \
            -m numerical_regression \
            --strict-markers \
            --junitxml=artifacts/boundary-reflection-regression-junit.xml

      - name: Assert installed regression was not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          path = "artifacts/boundary-reflection-regression-junit.xml"
          root = ET.parse(path).getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(f"testcases={len(testcases)} skipped={len(skipped)} failures={len(failures)} errors={len(errors)}")
          assert len(testcases) >= 1
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Run Stage 5 CI-light artifact runner
        run: |
          mkdir -p artifacts/boundary-reflection-regression
          python - <<'PY'
          from pathlib import Path
          from liquid_gas_transient.verification import run_boundary_reflection_regression

          output = Path("artifacts/boundary-reflection-regression/coolprop_boundary_reflection_ci_light_result.json")
          result = run_boundary_reflection_regression(output_path=output)
          assert result["overall_regression_pass"] is True
          assert result["failed_cases"] == []
          assert result["validation"] is False
          assert result["design_evaluation"] is False
          assert result["acceptance_gate"] is False
          assert result["property_backend_design_status"] == "not_approved_for_design_use"
          PY

      - name: Upload Stage 5 regression artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coolprop-boundary-reflection-regression-${{ github.run_id }}
          path: |
            artifacts/boundary-reflection-regression-junit.xml
            artifacts/boundary-reflection-regression/coolprop_boundary_reflection_ci_light_result.json
          if-no-files-found: error
          retention-days: 14
