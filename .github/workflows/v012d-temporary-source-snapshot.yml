name: V-012D Temporary Source Snapshot

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage6-v012d-closing-ramp
          fetch-depth: 0
      - name: Upload temporary source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: v012d-source-${{ github.sha }}
          path: |
            .
            !.git/**
            !verification/**
            !.ci-v012d/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
