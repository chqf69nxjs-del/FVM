name: Stage 7 First Crossing Case AB Freeze Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage7-first-crossing-case-ab-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-first-crossing-case-ab:
    name: validate-first-crossing-case-ab
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[plotting]"
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check environment
        run: |
          python - <<'PY'
          import sys
          import CoolProp
          import numpy as np

          print("Python:", sys.version)
          print("NumPy:", np.__version__)
          print("CoolProp:", CoolProp.__version__)
          assert CoolProp.__version__ == "8.0.0"
          PY

      - name: Static and diff checks
        run: |
          python -m compileall -q src/liquid_gas_transient
          git diff --check origin/main...HEAD

      - name: Run focused Case A/B tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_first_crossing_case_ab.py \
            --strict-markers \
            --junitxml=artifacts/stage7-first-crossing-case-ab-focused-junit.xml

      - name: Assert installed CoolProp test was not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          path = "artifacts/stage7-first-crossing-case-ab-focused-junit.xml"
          root = ET.parse(path).getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(
              f"testcases={len(testcases)} skipped={len(skipped)} "
              f"failures={len(failures)} errors={len(errors)}"
          )
          assert len(testcases) >= 14
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Run fixed repeated Case A/B matrix
        run: |
          python -m \
            liquid_gas_transient.hem_liquid_to_two_phase_first_crossing_case_ab \
            --output-dir artifacts/first-crossing-case-ab

      - name: Validate Case A/B freeze evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "artifacts/first-crossing-case-ab/"
              "stage7_lco2_hem_first_crossing_case_ab.json"
          )
          payload = json.loads(path.read_text(encoding="utf-8"))

          assert payload["scope"] == "verification_only"
          assert payload["repeat_count"] == 3
          assert payload["case_a_repeatable"] is True
          assert payload["case_b_repeatable"] is True
          assert payload["case_b_matched_physical_time"] is True
          assert payload["case_a_frozen"] is True
          assert payload["case_b_frozen"] is True
          assert payload["actual_first_order_fvm_crossing_verified"] is True
          assert payload["case_a_crossing_step"] == 1
          assert payload["case_a_crossing_cell_indices"] == [3, 4]
          assert payload["algorithms_or_tolerances_tuned"] is False
          assert payload["production_default_changed"] is False
          assert payload["production_hem_activation_approved"] is False
          assert payload["physical_validation"] is False
          assert payload["design_use_acceptance"] is False
          assert payload["two_phase_acoustic_accuracy_band_approved"] is False

          a_runs = [run for run in payload["runs"] if run["role"] == "Case A"]
          b_runs = [run for run in payload["runs"] if run["role"] == "Case B"]
          assert len(a_runs) == 3
          assert len(b_runs) == 3
          assert len({run["repeatability_signature"] for run in a_runs}) == 1
          assert len({run["repeatability_signature"] for run in b_runs}) == 1

          target = payload["case_a_crossing_time_s"]
          for run in a_runs:
              assert run["outcome"] == "ACCEPTED_CROSSING"
              assert run["crossing_step"] == 1
              assert run["crossing_cell_indices"] == [3, 4]
              assert run["projection_cell_indices"] == [3, 4]
              assert abs(
                  run["phase_budget_diagnostics"][
                      "phase_vapor_mass_balance_residual_kg"
                  ]
              ) <= 1.0e-12

          for run in b_runs:
              assert run["outcome"] == "MATCHED_ALL_LIQUID"
              assert run["crossing_cell_indices"] == []
              assert run["projection_cell_indices"] == []
              assert run["cumulative_projection_vapor_source_kg"] == 0.0
              assert abs(run["final_time_s"] - target) <= 1.0e-15

          print(json.dumps({
              "case_a_crossing_time_s": target,
              "case_a_signature": payload["case_a_repeatability_signature"],
              "case_b_signature": payload["case_b_repeatability_signature"],
          }, indent=2))
          PY

      - name: Run related Stage 7 HEM tests
        run: |
          python -m pytest -q \
            tests/test_stage7_lco2_hem_phase_classification.py \
            tests/test_stage7_lco2_hem_equilibrium_sound_speed.py \
            tests/test_stage7_lco2_hem_uniform_state_preservation.py \
            tests/test_stage7_lco2_hem_equilibrium_quality_sync.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_crossing.py \
            tests/test_stage7_lco2_hem_mixed_liquid_open_two_phase_eos.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_state_pair_survey.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_minimal_fvm_dry_run.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_projected_fvm_dry_run.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_first_crossing_case_ab.py \
            --strict-markers \
            --junitxml=artifacts/stage7-first-crossing-case-ab-related-junit.xml

      - name: Run full repository tests
        run: |
          python -m pytest -q \
            --strict-markers \
            --junitxml=artifacts/stage7-first-crossing-case-ab-full-junit.xml

      - name: Write validation summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          lines = ["# Stage 7 First-Crossing Case A/B Validation", ""]
          for label, path in (
              (
                  "focused",
                  Path(
                      "artifacts/"
                      "stage7-first-crossing-case-ab-focused-junit.xml"
                  ),
              ),
              (
                  "related",
                  Path(
                      "artifacts/"
                      "stage7-first-crossing-case-ab-related-junit.xml"
                  ),
              ),
              (
                  "full",
                  Path(
                      "artifacts/"
                      "stage7-first-crossing-case-ab-full-junit.xml"
                  ),
              ),
          ):
              if not path.exists():
                  lines.append(f"- {label}: artifact not produced")
                  continue
              root = ET.parse(path).getroot()
              testcases = root.findall(".//testcase")
              skipped = root.findall(".//skipped")
              failures = root.findall(".//failure")
              errors = root.findall(".//error")
              lines.append(
                  f"- {label}: tests={len(testcases)}, skipped={len(skipped)}, "
                  f"failures={len(failures)}, errors={len(errors)}"
              )

          evidence = Path(
              "artifacts/first-crossing-case-ab/"
              "stage7_lco2_hem_first_crossing_case_ab.json"
          )
          if evidence.exists():
              payload = json.loads(evidence.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      "",
                      f"- Case A frozen: {payload['case_a_frozen']}",
                      f"- Case B frozen: {payload['case_b_frozen']}",
                      "- software crossing verified: "
                      f"{payload['actual_first_order_fvm_crossing_verified']}",
                      f"- crossing time: {payload['case_a_crossing_time_s']}",
                      f"- crossing cells: {payload['case_a_crossing_cell_indices']}",
                  ]
              )

          lines.extend(
              [
                  "",
                  "Verification only. Production HEM, physical Validation, "
                  "design use, and acoustic accuracy approval remain false.",
              ]
          )
          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(lines),
              encoding="utf-8",
          )
          PY

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stage7-first-crossing-case-ab-validation-${{ github.run_id }}
          path: artifacts
          if-no-files-found: warn
          retention-days: 14
