name: V-012D Apply Verified Payload

on:
  push:
    branches:
      - agent/stage6-v012d-closing-ramp

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply locally verified V-012D files
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/v012d-payload.b64" <<'PAYLOAD'
          
          
          
          
          
          
          PAYLOAD
          sed -i 's/^[[:space:]]*//' "$RUNNER_TEMP/v012d-payload.b64"
          base64 --decode "$RUNNER_TEMP/v012d-payload.b64" > "$RUNNER_TEMP/v012d-payload.tar.gz"
          echo "23fa39cf48858b6946604a5a287035e9e52cd0b947ab3bae12faee64529a9449  $RUNNER_TEMP/v012d-payload.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/v012d-payload.tar.gz" -C "$GITHUB_WORKSPACE"
          rm -f .github/workflows/v012d-apply-payload.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/liquid_gas_transient/cases/internal_valve_closing_ramp_config.py \
            src/liquid_gas_transient/cases/coolprop_internal_valve_closing_ramp.py \
            src/liquid_gas_transient/cases/coolprop_internal_valve_closing_ramp_artifacts.py \
            src/liquid_gas_transient/plot_internal_valve_closing_ramp_results.py \
            tests/test_coolprop_internal_valve_closing_ramp.py \
            tests/test_coolprop_internal_valve_closing_ramp_plots.py \
            docs/verification/stage6_v012d_closing_ramp_observation_notes.md \
            docs/verification/MASTER_VERIFICATION_INDEX.md \
            docs/verification/stage6_v012_execution_log.md \
            docs/verification/stage6_execution_log.md \
            .github/workflows/v012d-apply-payload.yml
          git diff --cached --check
          git commit -m "Add V-012D controlled internal-valve closing ramp"
          git push origin HEAD:agent/stage6-v012d-closing-ramp
