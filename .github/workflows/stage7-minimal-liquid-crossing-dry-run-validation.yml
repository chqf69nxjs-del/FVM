name: Stage 7 Minimal Liquid Crossing Dry Run Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage7-minimal-liquid-crossing-dry-run-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-minimal-dry-run:
    name: validate-minimal-liquid-crossing-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[plotting]"
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check environment
        run: |
          python - <<'PY'
          import sys
          import CoolProp
          import numpy as np

          print("Python:", sys.version)
          print("NumPy:", np.__version__)
          print("CoolProp:", CoolProp.__version__)
          assert CoolProp.__version__ == "8.0.0"
          PY

      - name: Static and diff checks
        run: |
          python -m compileall -q src/liquid_gas_transient
          git diff --check origin/main...HEAD

      - name: Run minimal dry-run focused tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_minimal_fvm_dry_run.py \
            --strict-markers \
            --junitxml=artifacts/stage7-minimal-dry-run-focused-junit.xml

      - name: Assert installed CoolProp test was not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          path = "artifacts/stage7-minimal-dry-run-focused-junit.xml"
          root = ET.parse(path).getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(
              f"testcases={len(testcases)} skipped={len(skipped)} "
              f"failures={len(failures)} errors={len(errors)}"
          )
          assert len(testcases) >= 15
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Run fixed one-step dry-run matrix
        run: |
          python -m \
            liquid_gas_transient.hem_liquid_to_two_phase_minimal_fvm_dry_run \
            --output-dir artifacts/minimal-dry-run \
            --n-cells 8 \
            --cfl 0.20 \
            --length-m 1.0 \
            --diameter-m 0.10

      - name: Validate dry-run evidence flags
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "artifacts/minimal-dry-run/"
              "stage7_lco2_hem_minimal_raw_fvm_dry_run.json"
          )
          payload = json.loads(path.read_text(encoding="utf-8"))

          assert payload["scope"] == "verification_only"
          assert payload["case_count"] == 3
          assert payload["all_cases_exercised_one_fvm_step"] is True
          assert payload["fvm_solver_step_exercised"] is True
          assert payload["rusanov_flux_exercised"] is True
          assert payload["cfl_path_exercised"] is True
          assert payload["phase_projection_exercised"] is False
          assert payload["accepted_state_eos_after_raw_exercised"] is False
          assert payload["actual_first_order_fvm_crossing_verified"] is False
          assert payload["case_a_frozen"] is False
          assert payload["case_b_frozen"] is False
          assert payload["algorithms_or_tolerances_tuned"] is False
          assert payload["production_hem_activation_approved"] is False
          assert payload["physical_validation"] is False
          assert payload["design_use_acceptance"] is False

          for case in payload["cases"]:
              assert case["outcome"] not in {"GUARD_FAILURE", "BACKEND_FAILURE"}
              assert case["fvm_step_exercised"] is True
              assert case["initial_transport_quality_exactly_zero"] is True
              assert case["raw_transport_quality_exactly_zero"] is True
              assert case["changed_cell_indices"] == [3, 4]

          print(json.dumps({
              "outcome_counts": payload["outcome_counts"],
              "raw_crossing_case_ids": payload["raw_crossing_case_ids"],
              "cases": [
                  {
                      "case_id": case["case_id"],
                      "outcome": case["outcome"],
                      "max_raw_equilibrium_quality": case[
                          "max_raw_equilibrium_quality"
                      ],
                      "max_raw_quality_mismatch": case[
                          "max_raw_quality_mismatch"
                      ],
                      "event_counts": case["event_counts"],
                      "raw_region_counts": case["raw_region_counts"],
                      "budget_diagnostics": case["budget_diagnostics"],
                  }
                  for case in payload["cases"]
              ],
          }, indent=2))
          PY

      - name: Run related Stage 7 HEM tests
        run: |
          python -m pytest -q \
            tests/test_stage7_lco2_hem_phase_classification.py \
            tests/test_stage7_lco2_hem_equilibrium_sound_speed.py \
            tests/test_stage7_lco2_hem_uniform_state_preservation.py \
            tests/test_stage7_lco2_hem_equilibrium_quality_sync.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_crossing.py \
            tests/test_stage7_lco2_hem_mixed_liquid_open_two_phase_eos.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_state_pair_survey.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_minimal_fvm_dry_run.py \
            --strict-markers \
            --junitxml=artifacts/stage7-minimal-dry-run-related-junit.xml

      - name: Run full repository tests
        run: |
          python -m pytest -q \
            --strict-markers \
            --junitxml=artifacts/stage7-minimal-dry-run-full-junit.xml

      - name: Write validation summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          lines = ["# Stage 7 Minimal Liquid Crossing Dry Run Validation", ""]
          for label, path in (
              ("focused", Path("artifacts/stage7-minimal-dry-run-focused-junit.xml")),
              ("related", Path("artifacts/stage7-minimal-dry-run-related-junit.xml")),
              ("full", Path("artifacts/stage7-minimal-dry-run-full-junit.xml")),
          ):
              if not path.exists():
                  lines.append(f"- {label}: artifact not produced")
                  continue
              root = ET.parse(path).getroot()
              testcases = root.findall(".//testcase")
              skipped = root.findall(".//skipped")
              failures = root.findall(".//failure")
              errors = root.findall(".//error")
              lines.append(
                  f"- {label}: tests={len(testcases)}, skipped={len(skipped)}, "
                  f"failures={len(failures)}, errors={len(errors)}"
              )

          dry_run = Path(
              "artifacts/minimal-dry-run/"
              "stage7_lco2_hem_minimal_raw_fvm_dry_run.json"
          )
          if dry_run.exists():
              payload = json.loads(dry_run.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      "",
                      f"- outcomes: {payload['outcome_counts']}",
                      f"- raw crossing cases: {payload['raw_crossing_case_ids']}",
                  ]
              )
              for case in payload["cases"]:
                  lines.append(
                      "- {case}: outcome={outcome}, max q_eq={q}".format(
                          case=case["case_id"],
                          outcome=case["outcome"],
                          q=case["max_raw_equilibrium_quality"],
                      )
                  )

          lines.extend(
              [
                  "",
                  "One raw first-order FVM step only. No projection, formal crossing ",
                  "verification, production, Validation, acoustic-band, or design-use approval.",
              ]
          )
          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(lines),
              encoding="utf-8",
          )
          PY

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stage7-minimal-dry-run-validation-${{ github.run_id }}
          path: artifacts
          if-no-files-found: warn
          retention-days: 14
