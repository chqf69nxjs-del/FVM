name: CoolProp Wave Regression

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coolprop-wave-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coolprop-wave-regression:
    name: coolprop-wave-regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check CoolProp environment
        run: |
          python - <<'PY'
          import math
          import platform
          import sys

          import CoolProp
          import CoolProp.CoolProp as CP
          import numpy as np
          import liquid_gas_transient

          rho = CP.PropsSI("D", "P", 8.0e6, "T", 280.0, "CO2")
          print("Python:", sys.version)
          print("Platform:", platform.platform())
          print("NumPy:", np.__version__)
          print("CoolProp:", CoolProp.__version__)
          print("liquid_gas_transient:", getattr(liquid_gas_transient, "__version__", "unknown"))
          print("CO2 density smoke kg/m3:", rho)
          assert CoolProp.__version__ == "8.0.0"
          assert math.isfinite(rho) and rho > 0.0
          PY

      - name: Run installed CoolProp numerical regression test
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_coolprop_wave_regression.py \
            -m numerical_regression \
            --strict-markers \
            --junitxml=artifacts/coolprop-wave-regression-junit.xml

      - name: Assert numerical regression test was not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          path = "artifacts/coolprop-wave-regression-junit.xml"
          root = ET.parse(path).getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(f"testcases={len(testcases)} skipped={len(skipped)} failures={len(failures)} errors={len(errors)}")
          assert len(testcases) >= 1
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Run CI-light regression artifact runner
        run: |
          mkdir -p artifacts/coolprop-wave-regression
          python - <<'PY'
          import json
          import platform
          import sys
          from pathlib import Path

          import CoolProp

          from liquid_gas_transient.verification import run_coolprop_wave_regression

          output_path = Path("artifacts/coolprop-wave-regression/coolprop_wave_ci_light_regression_result.json")
          result = run_coolprop_wave_regression(output_path=output_path)

          assert result["overall_regression_pass"] is True
          assert result["failed_checks"] == []
          assert result["regression_evaluation"] is True
          assert result["software_path_verification"] is True
          assert result["numerical_verification"] is True
          assert result["design_evaluation"] is False
          assert result["acceptance_gate"] is False
          assert result["validation"] is False
          assert result["property_backend_design_status"] == "not_approved_for_design_use"

          summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          lines = [
              "# CoolProp Wave Regression",
              "",
              "This is a regression pass for a software / numerical guard only.",
              "",
              f"- Python version: {sys.version.split()[0]}",
              f"- Platform: {platform.platform()}",
              f"- CoolProp version: {CoolProp.__version__}",
              f"- profile_name: {result['profile_name']}",
              f"- overall_regression_pass: {result['overall_regression_pass']}",
              f"- failed_checks: {json.dumps(result['failed_checks'])}",
              f"- warnings: {json.dumps(result.get('warnings', []))}",
              f"- design_evaluation: {result['design_evaluation']}",
              f"- validation: {result['validation']}",
              f"- property_backend_design_status: {result['property_backend_design_status']}",
              "",
          ]
          summary.write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Upload regression artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coolprop-wave-regression-${{ github.run_id }}
          path: |
            artifacts/coolprop-wave-regression-junit.xml
            artifacts/coolprop-wave-regression/coolprop_wave_ci_light_regression_result.json
          if-no-files-found: error
          retention-days: 14

  sync-v013-reference-core-docs:
    name: sync-v013-reference-core-docs
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synchronization branch
        uses: actions/checkout@v7
        with:
          ref: agent/stage7-v013-reference-core-post-merge-sync
          fetch-depth: 0

      - name: Synchronize merged reference-core status
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          merge_commit = "3945136dbe26db98044e49fb093b37122bf8b1fd"

          def replace_if_present(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding="utf-8")
              if old in text:
                  path.write_text(text.replace(old, new, 1), encoding="utf-8")

          master = Path("docs/verification/MASTER_VERIFICATION_INDEX.md")
          replace_if_present(
              master,
              "- Stage 7 / V-013 independent reference coreはPR #46で実装し、`IMPLEMENTED; TESTED; READY FOR REVIEW`。",
              f"- Stage 7 / V-013 independent reference coreはPR #46でマージ済み。merge commitは`{merge_commit}`。",
          )
          replace_if_present(
              master,
              "- status: `IMPLEMENTED; TESTED; READY FOR REVIEW`",
              f"- status: `IMPLEMENTED; TESTED; MERGED`\n- merge commit: `{merge_commit}`",
          )
          replace_if_present(
              master,
              "PR #46 independent analytical / CFL=1 MOC reference core、23 self-tests、299 full tests、deterministic artifact",
              f"PR #46 independent analytical / CFL=1 MOC reference core merged at `{merge_commit}`、23 self-tests、299 full tests、deterministic artifact",
          )
          replace_if_present(
              master,
              "- PR #46: V-013 independent analytical / CFL=1 MOC reference core、23 self-tests、299-test full-suite evidenceを記録。V-013は`IN_PROGRESS`を維持し、次はV-013A incident propagation。",
              f"- PR #46 merge commit: `{merge_commit}`。V-013 independent analytical / CFL=1 MOC reference core、23 self-tests、299-test full-suite evidenceをmainへ反映。V-013は`IN_PROGRESS`を維持し、次はV-013A incident propagation。",
          )

          notes = Path("docs/verification/stage7_v013_reference_core_notes.md")
          replace_if_present(
              notes,
              "`IMPLEMENTED; TESTED; READY FOR REVIEW`",
              f"`IMPLEMENTED; TESTED; MERGED`\n\nMerge commit: `{merge_commit}`",
          )

          log = Path("docs/verification/stage7_execution_log.md")
          text = log.read_text(encoding="utf-8")
          marker = "## 2026-07-18 — V-013 reference core merged"
          if marker not in text:
              if not text.endswith("\n"):
                  text += "\n"
              text += f"""

## 2026-07-18 — V-013 reference core merged

- PR: `#46`
- merge commit: `{merge_commit}`
- reference-core self-tests: `23 passed`, `0 skipped`
- full repository tests: `299 passed in 150.31 s`
- production solver changes: none
- next action: V-013A incident propagation integration
"""
              log.write_text(text, encoding="utf-8")
          PY

      - name: Commit synchronized documentation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            docs/verification/MASTER_VERIFICATION_INDEX.md \
            docs/verification/stage7_execution_log.md \
            docs/verification/stage7_v013_reference_core_notes.md
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No documentation changes to commit"
            exit 0
          fi
          git commit -m "Record merged V-013 reference core"
          git push origin HEAD:agent/stage7-v013-reference-core-post-merge-sync
