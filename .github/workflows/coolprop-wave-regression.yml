name: CoolProp Wave Regression

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coolprop-wave-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coolprop-wave-regression:
    name: coolprop-wave-regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src
      HEM_UNIFORM_OUTPUT_DIR: artifacts/stage7-lco2-hem-uniform-state
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Confirm clean checkout
        run: test -z "$(git status --porcelain --untracked-files=no)"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[plotting]"
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check CoolProp environment
        run: |
          python - <<'PY'
          import math
          import platform
          import sys
          import CoolProp
          import CoolProp.CoolProp as CP
          import matplotlib
          import numpy as np
          import liquid_gas_transient
          from liquid_gas_transient import hem_uniform_state_preservation
          rho = CP.PropsSI("D", "P", 8.0e6, "T", 280.0, "CO2")
          print("Python:", sys.version)
          print("Platform:", platform.platform())
          print("NumPy:", np.__version__)
          print("Matplotlib:", matplotlib.__version__)
          print("CoolProp:", CoolProp.__version__)
          print("uniform module:", hem_uniform_state_preservation.__name__)
          assert CoolProp.__version__ == "8.0.0"
          assert math.isfinite(rho) and rho > 0.0
          PY

      - name: Run installed CoolProp numerical regression test
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_coolprop_wave_regression.py \
            -m numerical_regression \
            --strict-markers \
            --junitxml=artifacts/coolprop-wave-regression-junit.xml

      - name: Assert numerical regression test was not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("artifacts/coolprop-wave-regression-junit.xml").getroot()
          assert len(root.findall(".//testcase")) >= 1
          assert len(root.findall(".//skipped")) == 0
          assert len(root.findall(".//failure")) == 0
          assert len(root.findall(".//error")) == 0
          PY

      - name: Run CI-light regression artifact runner
        run: |
          mkdir -p artifacts/coolprop-wave-regression
          python - <<'PY'
          from pathlib import Path
          from liquid_gas_transient.verification import run_coolprop_wave_regression
          output_path = Path("artifacts/coolprop-wave-regression/coolprop_wave_ci_light_regression_result.json")
          result = run_coolprop_wave_regression(output_path=output_path)
          assert result["overall_regression_pass"] is True
          assert result["failed_checks"] == []
          assert result["validation"] is False
          assert result["property_backend_design_status"] == "not_approved_for_design_use"
          PY

      - name: Run focused HEM uniform-state tests
        id: hem_focused
        continue-on-error: true
        run: |
          python -m pytest -q \
            tests/test_stage7_lco2_hem_thermodynamic_scaffold.py \
            tests/test_stage7_lco2_hem_phase_classification.py \
            tests/test_stage7_lco2_hem_equilibrium_sound_speed.py \
            tests/test_stage7_lco2_hem_uniform_state_preservation.py \
            tests/test_coolprop_backend_installed.py \
            --junitxml=artifacts/stage7-hem-uniform-focused-junit.xml

      - name: Summarize focused HEM JUnit
        if: always()
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path
          path = Path("artifacts/stage7-hem-uniform-focused-junit.xml")
          payload = {"file_exists": path.is_file(), "failures": [], "errors": [], "skipped": []}
          if path.is_file():
              root = ET.parse(path).getroot()
              payload["testcase_count"] = len(root.findall(".//testcase"))
              for tag in ("failure", "error", "skipped"):
                  for case in root.findall(".//testcase"):
                      node = case.find(tag)
                      if node is not None:
                          payload[f"{tag}s"].append({
                              "classname": case.get("classname"),
                              "name": case.get("name"),
                              "message": node.get("message"),
                              "text": (node.text or "")[-4000:],
                          })
          Path("artifacts/stage7-hem-uniform-focused-summary.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Generate uniform HEM preservation evidence
        if: always()
        id: hem_runner
        continue-on-error: true
        run: |
          python -m liquid_gas_transient.hem_uniform_state_preservation \
            --output-dir "$HEM_UNIFORM_OUTPUT_DIR" \
            --cells 8 \
            --steps 8
          find "$HEM_UNIFORM_OUTPUT_DIR" -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Validate uniform HEM evidence
        if: always()
        id: hem_evidence
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          path = Path(os.environ["HEM_UNIFORM_OUTPUT_DIR"]) / "stage7_lco2_hem_uniform_state_preservation.json"
          payload = json.loads(path.read_text(encoding="utf-8"))
          assert payload["schema_version"] == "stage7_lco2_hem_uniform_state_preservation_v1"
          assert payload["scope"] == "verification_only"
          assert payload["fvm_solver_exercised"] is True
          assert payload["rusanov_flux_exercised"] is True
          assert payload["cfl_exercised"] is True
          assert payload["uniform_state_preserved"] is True
          assert payload["production_default_changed"] is False
          assert payload["production_hem_activation_approved"] is False
          assert payload["physical_validation"] is False
          assert payload["design_use_acceptance"] is False
          assert payload["conserved_max_abs_drift"] <= 1.0e-10
          assert payload["conserved_max_relative_drift"] <= 1.0e-12
          assert len(payload["history"]) == 9
          PY

      - name: Run full repository suite for HEM uniform-state increment
        if: always()
        id: full_suite
        continue-on-error: true
        run: python -m pytest -q --junitxml=artifacts/stage7-hem-uniform-full-junit.xml

      - name: Check committed diffs
        if: always()
        id: diff_check
        continue-on-error: true
        run: |
          git diff --check origin/agent/stage7-lco2-hem-equilibrium-sound-speed...HEAD
          git diff --check origin/main...HEAD
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload regression and HEM uniform-state diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coolprop-wave-regression-${{ github.run_id }}
          path: |
            artifacts/coolprop-wave-regression-junit.xml
            artifacts/coolprop-wave-regression/coolprop_wave_ci_light_regression_result.json
            artifacts/stage7-hem-uniform-focused-junit.xml
            artifacts/stage7-hem-uniform-focused-summary.json
            artifacts/stage7-hem-uniform-full-junit.xml
            artifacts/stage7-lco2-hem-uniform-state
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce HEM validation results
        if: always()
        run: |
          test "${{ steps.hem_focused.outcome }}" = "success"
          test "${{ steps.hem_runner.outcome }}" = "success"
          test "${{ steps.hem_evidence.outcome }}" = "success"
          test "${{ steps.full_suite.outcome }}" = "success"
          test "${{ steps.diff_check.outcome }}" = "success"
