name: V-012D Apply Trigger Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out V-012D branch
        uses: actions/checkout@v4
        with:
          ref: agent/stage6-v012d-closing-ramp
          fetch-depth: 0

      - name: Decode and verify payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          from pathlib import Path

          workflow = Path('.github/workflows/v012d-apply-payload.yml').read_text(
              encoding='utf-8'
          )
          marker = "<<'PAYLOAD'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index('\n          PAYLOAD', start)
          encoded = ''.join(line.strip() for line in workflow[start:end].splitlines())
          print(f'encoded_bytes={len(encoded)}')
          assert len(encoded) == 39812, len(encoded)
          payload = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(payload).hexdigest()
          print(f'payload_bytes={len(payload)}')
          print(f'payload_sha256={digest}')
          assert len(payload) == 29859, len(payload)
          assert digest == '23fa39cf48858b6946604a5a287035e9e52cd0b947ab3bae12faee64529a9449'
          Path('/tmp/v012d-payload.tar.gz').write_bytes(payload)
          PY

      - name: Extract verified files
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf /tmp/v012d-payload.tar.gz
          tar -xzf /tmp/v012d-payload.tar.gz -C "$GITHUB_WORKSPACE"
          rm -f \
            .github/workflows/v012d-apply-payload.yml \
            .github/workflows/v012d-apply-trigger.yml \
            .github/workflows/v012d-apply-trigger-diagnostic.yml

      - name: Commit verified files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --stat
          git commit -m "Add V-012D controlled internal-valve closing ramp"

      - name: Push verified files
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:agent/stage6-v012d-closing-ramp
