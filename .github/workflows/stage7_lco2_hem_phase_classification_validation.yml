name: Stage 7 LCO2 HEM Phase Classification Validation

on:
  push:
    branches:
      - agent/stage7-lco2-hem-phase-classification
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      PYTHONPATH: src
      OUTPUT_DIR: ${{ runner.temp }}/stage7_lco2_hem_phase_map

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Confirm clean checkout
        run: test -z "$(git status --porcelain --untracked-files=no)"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check environment
        run: |
          python - <<'PY'
          import CoolProp
          from liquid_gas_transient import hem_phase_classification
          print("CoolProp", CoolProp.__version__)
          print("module", hem_phase_classification.__name__)
          assert CoolProp.__version__ == "8.0.0"
          PY

      - name: Run focused phase-classification tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_stage7_lco2_hem_thermodynamic_scaffold.py \
            tests/test_stage7_lco2_hem_phase_classification.py \
            tests/test_coolprop_backend_installed.py \
            --junitxml=artifacts/stage7-hem-phase-focused-junit.xml

      - name: Assert focused tests were not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("artifacts/stage7-hem-phase-focused-junit.xml").getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(len(testcases), len(skipped), len(failures), len(errors))
          assert len(testcases) >= 25
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Generate representative CoolProp phase map
        run: |
          python -m liquid_gas_transient.hem_phase_classification \
            --output-dir "$OUTPUT_DIR"
          find "$OUTPUT_DIR" -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Validate phase map evidence
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          payload = json.loads(
              (output_dir / "stage7_lco2_hem_coolprop_phase_map.json").read_text(
                  encoding="utf-8"
              )
          )
          assert payload["schema_version"] == "stage7_lco2_hem_coolprop_phase_map_v1"
          assert payload["scope"] == "verification_only"
          assert payload["explicit_phase_classification_added"] is True
          assert payload["sound_speed_evaluated"] is False
          assert payload["equilibrium_two_phase_sound_speed_closure_approved"] is False
          assert payload["critical_region_guarded_out"] is True
          assert payload["solid_region_guarded_out"] is True
          assert payload["supercritical_in_current_liquid_vapor_scope"] is False
          assert payload["physical_validation"] is False
          assert payload["design_use_acceptance"] is False
          rows = payload["results"]
          assert len(rows) == 9
          classes = {row["phase_class"] for row in rows}
          assert "compressed_or_subcooled_liquid" in classes
          assert "liquid_vapor_two_phase" in classes
          assert "single_phase_vapor" in classes
          assert "supercritical" in classes
          assert all(row["sound_speed_evaluated"] is False for row in rows)
          PY

      - name: Run full repository suite
        run: python -m pytest -q --junitxml=artifacts/stage7-hem-phase-full-junit.xml

      - name: Check committed diff
        run: |
          git diff --check origin/agent/stage7-lco2-hem-thermodynamic-scaffold...HEAD
          git diff --check origin/main...HEAD

      - name: Confirm tracked and staged files remain unchanged
        run: |
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload phase-map evidence
        uses: actions/upload-artifact@v7
        with:
          name: stage7-lco2-hem-phase-classification
          path: |
            artifacts/stage7-hem-phase-focused-junit.xml
            artifacts/stage7-hem-phase-full-junit.xml
            ${{ runner.temp }}/stage7_lco2_hem_phase_map
          if-no-files-found: error
          retention-days: 14
