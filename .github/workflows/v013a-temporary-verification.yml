name: V-013A Finalize PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize-v013a:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg
      SOURCE_HEAD: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" "matplotlib>=3.7"

      - name: Apply final V-013A fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one match, found {count}: {old!r}")
              write(path, text.replace(old, new, 1))

          source = "src/liquid_gas_transient/cases/v013_incident_propagation.py"
          replace_once(
              source,
              "import json\nimport math\nfrom pathlib import Path\n",
              "import json\nimport math\nfrom importlib.metadata import PackageNotFoundError, version\nfrom pathlib import Path\n",
          )
          text = read(source)
          trap_count = text.count("np.trapezoid(")
          if trap_count != 4:
              raise RuntimeError(f"{source}: expected four np.trapezoid calls, found {trap_count}")
          text = text.replace("np.trapezoid(", "np.trapz(")
          marker = "\n\ndef normalized_error_norms(\n"
          helper = """

def _installed_coolprop_version() -> str:
    try:
        return version("CoolProp")
    except PackageNotFoundError:
        return "unavailable"


def normalized_error_norms(
"""
          if text.count(marker) != 1:
              raise RuntimeError(f"{source}: normalized_error_norms marker mismatch")
          text = text.replace(marker, helper, 1)
          backend_marker = '        "property_backend_name": "coolprop_co2",\n'
          backend_count = text.count(backend_marker)
          if backend_count < 1:
              raise RuntimeError(f"{source}: property backend marker missing")
          text = text.replace(
              backend_marker,
              backend_marker + '        "coolprop_version": _installed_coolprop_version(),\n',
          )
          write(source, text)

          tests = "tests/test_v013_incident_propagation.py"
          replace_once(
              tests,
              "from __future__ import annotations\n\nimport csv\n",
              "from __future__ import annotations\n\nfrom importlib.metadata import version\nimport csv\n",
          )
          replace_once(
              tests,
              '    assert fvm_metrics["overall_fvm_health_pass"] is True\n'
              '    assert fvm_metrics["solver_physics_changed"] is False\n',
              '    assert fvm_metrics["overall_fvm_health_pass"] is True\n'
              '    assert fvm_metrics["solver_physics_changed"] is False\n'
              '    assert fvm_metrics["coolprop_version"] == version("CoolProp")\n',
          )

          plotter = "src/liquid_gas_transient/plot_v013_incident_propagation_results.py"
          text = read(plotter)
          sort_old = 'sorted(summary, key=lambda row: float(row["dx_m"]), reverse=True)'
          if text.count(sort_old) != 3:
              raise RuntimeError(f"{plotter}: expected three descending dx sorts")
          text = text.replace(
              sort_old,
              'sorted(summary, key=lambda row: float(row["dx_m"]))',
          )
          label_old = 'ax.set_xlabel("dx [m] (coarse to fine)")'
          if text.count(label_old) != 3:
              raise RuntimeError(f"{plotter}: expected three old dx labels")
          text = text.replace(
              label_old,
              'ax.set_xlabel("mesh spacing Δx [m]")',
          )
          write(plotter, text)

          master = "docs/verification/MASTER_VERIFICATION_INDEX.md"
          replace_once(
              master,
              "- Stage 7 / V-013は`IN_PROGRESS`。次はV-013A incident propagation接続。\n",
              "- Stage 7 / V-013A incident propagationはPR #48で観測済み。"
              "`OBSERVED; READY FOR REVIEW`。\n"
              "- V-013AではFVM `n=100 / 200 / 400`の伝播方向と概略波速を確認し、"
              "`n=400`でも圧力ピーク保持率約`0.575`の強い数値拡散を観測した。\n"
              "- Stage 7 / V-013全体は`IN_PROGRESS`。次はV-013B rigid-wall reflection。\n",
          )
          replace_once(
              master,
              "- production solver changes: none\n\n### 次の段階\n",
              "- production solver changes: none\n\n"
              "### 直近V-013A観測段階\n\n"
              "V-013A incident propagation cross verification\n\n"
              "- PR: `#48`\n"
              "- status: `OBSERVED; READY FOR REVIEW`\n"
              "- FVM / MOC meshes: `100 / 200 / 400`\n"
              "- FVM / MOC CFL: `0.5 / 1.0`\n"
              "- focused tests: `39 passed`, `0 skipped`\n"
              "- full repository tests: `315 passed`, `0 skipped`\n"
              "- planned / executed runs: `3 / 3`\n"
              "- comparison plots: `7 / 7`\n"
              "- FVM propagation direction and approximate speed: consistent\n"
              "- finest-mesh pressure peak ratio: approximately `0.575`\n"
              "- dominant observation: strong but monotonically decreasing FVM numerical diffusion\n"
              "- physical Validation: `False`\n"
              "- design-use acceptance: `False`\n"
              "- production solver changes: none\n\n"
              "### 次の段階\n",
          )
          replace_once(
              master,
              "1. stable V-013A case ID、run plan、matched-sample schemaを固定する。\n"
              "2. existing small-amplitude FVM source caseをsolver physics変更なしで接続する。\n"
              "3. independent referenceへ渡す`rho0` / `c0` provenanceを記録する。\n"
              "4. V-013A incident propagationを`n=100 / 200 / 400`で実行・比較する。\n"
              "5. V-013Aレビュー後にV-013B / V-013Cへ進み、全観測後にのみCI-light bandを提案する。\n",
              "1. PR #48のV-013A observationをレビューし、mainへマージする。\n"
              "2. V-013B rigid-wall reflectionの固定条件、観測窓、符号規約を確定する。\n"
              "3. V-013Aと同じ独立reference、`rho0` / `c0` provenance、no phase shiftingを維持する。\n"
              "4. V-013Bを`n=100 / 200 / 400`で実行・比較する。\n"
              "5. V-013Cまで観測後にのみCI-light bandを提案する。\n",
          )
          replace_once(
              master,
              "| V-013 | MOC / linear-acoustic cross verification | IN_PROGRESS | "
              "PR #44 specification、PR #46 independent analytical / CFL=1 MOC reference core merged at "
              "`3945136dbe26db98044e49fb093b37122bf8b1fd`、23 self-tests、299 full tests、deterministic artifact | "
              "FVM接続とV-013A/B/C観測は未実施。MOCはverification用限定 | "
              "V-013A incident propagation integration |\n",
              "| V-013 | MOC / linear-acoustic cross verification | IN_PROGRESS | "
              "PR #44 specification、PR #46 independent analytical / CFL=1 MOC reference core、"
              "PR #48 V-013A incident propagation `OBSERVED; READY FOR REVIEW`、"
              "FVM/MOC `n=100 / 200 / 400`、39 focused tests、315 full tests、3/3 runs、7/7 plots | "
              "V-013B/C、formal band、physical Validation、design-use acceptanceは未実施。"
              "MOCはverification用限定 | V-013B rigid-wall reflection |\n",
          )
          replace_once(
              master,
              "docs/verification/stage7_v013_reference_core_notes.md\n"
              "src/liquid_gas_transient/verification/linear_acoustic_reference.py\n"
              "tests/test_linear_acoustic_reference.py\n",
              "docs/verification/stage7_v013_reference_core_notes.md\n"
              "docs/verification/stage7_v013a_incident_propagation_observation_notes.md\n"
              "src/liquid_gas_transient/verification/linear_acoustic_reference.py\n"
              "src/liquid_gas_transient/cases/v013_incident_propagation.py\n"
              "src/liquid_gas_transient/plot_v013_incident_propagation_results.py\n"
              "tests/test_linear_acoustic_reference.py\n"
              "tests/test_v013_incident_propagation.py\n",
          )
          replace_once(
              master,
              "- V-013A FVM integration remains the next action.\n",
              "- V-013A FVM / MOC / analytical incident propagation is observed and ready for review;\n"
              "- propagation direction and approximate wave speed are consistent;\n"
              "- FVM numerical diffusion remains strong: final `n=400` peak ratio is approximately `0.575`;\n"
              "- all results remain software / numerical verification only;\n"
              "- V-013B rigid-wall reflection is the next action.\n",
          )
          replace_once(
              master,
              "| Stage 7 | IN_PROGRESS | V-013 reference core implemented and tested; "
              "V-013A/B/C FVM comparison and observation remain |\n",
              "| Stage 7 | IN_PROGRESS | V-013A incident propagation observed and ready for review; "
              "V-013B rigid-wall and V-013C fixed-pressure observations remain |\n",
          )

          stage7 = "docs/verification/stage7_execution_log.md"
          stage7_text = read(stage7)
          section = """

## 2026-07-19 — V-013A incident propagation observation

Status:

```text
OBSERVED; READY FOR REVIEW
```

Scope and evidence:

- PR: `#48`
- FVM meshes: `n=100 / 200 / 400`, `CFL=0.5`
- MOC meshes: `n=100 / 200 / 400`, `CFL=1.0`
- focused tests: `39 passed`, `0 skipped`
- full repository tests: `315 passed`, `0 skipped`
- planned / executed runs: `3 / 3`
- human-review figures: `7 / 7`
- propagation direction: correct
- approximate propagation speed: consistent with the recorded `c0`
- final `n=400` FVM pressure peak ratio: approximately `0.575`
- dominant discrepancy: strong but monotonically decreasing FVM numerical diffusion
- boundary-return contamination in the accepted incident window: not observed
- production solver behaviour changes: none

Guardrails:

- software / numerical verification only;
- physical Validation: `False`;
- design-use acceptance: `False`;
- property backend design status: `not_approved_for_design_use`;
- independent MOC / analytical path does not call CoolProp;
- finest mesh is not treated as exact;
- no V-013 CI-light band is selected yet.

V-013 remains `IN_PROGRESS`.  The next implementation item after PR #48 is
V-013B rigid-wall reflection.
"""
          if "## 2026-07-19 — V-013A incident propagation observation" in stage7_text:
              raise RuntimeError(f"{stage7}: V-013A section already present")
          write(stage7, stage7_text.rstrip() + section + "\n")

          notes = "docs/verification/stage7_v013a_incident_propagation_observation_notes.md"
          replace_once(
              notes,
              "comparison plots:           7 / 7\n",
              "comparison plots:           7 / 7\n"
              "CoolProp version:           8.0.0\n",
          )
          replace_once(notes, "| n | dx [m] |", "| n | Δx [m] |")
          replace_once(
              notes,
              "call CoolProp.\n",
              "call CoolProp.  Finalization also persists the installed `coolprop_version`\n"
              "in each FVM metrics artifact.\n",
          )

          workflow = Path(".github/workflows/v013a-temporary-verification.yml")
          if not workflow.exists():
              raise RuntimeError("temporary V-013A workflow is missing")
          workflow.unlink()
          PY

      - name: Compile V-013A source and tests
        run: |
          python -m compileall -q \
            src/liquid_gas_transient/cases/v013_incident_propagation.py \
            src/liquid_gas_transient/plot_v013_incident_propagation_results.py \
            tests/test_v013_incident_propagation.py

      - name: Run V-013A focused tests
        run: |
          set -o pipefail
          mkdir -p artifacts/test-results
          python -m pytest -q \
            tests/test_linear_acoustic_reference.py \
            tests/test_v013_incident_propagation.py \
            --strict-markers \
            --junitxml=artifacts/test-results/v013a-focused-junit.xml \
            | tee artifacts/test-results/v013a-focused.txt

      - name: Run full repository tests
        run: |
          set -o pipefail
          python -m pytest -q \
            --junitxml=artifacts/test-results/full-repository-junit.xml \
            | tee artifacts/test-results/full-repository.txt

      - name: Execute final V-013A observation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from liquid_gas_transient.cases.v013_incident_propagation import (
              V013IncidentPropagationConfig,
              run_v013_incident_propagation,
          )

          output = Path("artifacts/v013a-finalization")
          result = run_v013_incident_propagation(
              output,
              V013IncidentPropagationConfig(
                  fvm_mesh_cells=(100, 200, 400),
                  generate_plots=True,
              ),
          )
          summary = {
              "planned_run_count": result["planned_run_count"],
              "executed_run_count": result["executed_run_count"],
              "overall_execution_pass": result["overall_execution_pass"],
              "aggregate_analysis_complete": result["aggregate_analysis_complete"],
              "comparison_plots_complete": result["comparison_plots_complete"],
              "generated_plots": result["generated_plots"],
              "runtime_s": result["runtime_s"],
              "summary_rows": result["summary_rows"],
          }
          print(json.dumps(summary, indent=2))
          assert result["planned_run_count"] == 3
          assert result["executed_run_count"] == 3
          assert result["overall_execution_pass"] is True
          assert result["aggregate_analysis_complete"] is True
          assert result["comparison_plots_complete"] is True
          assert len(result["generated_plots"]) == 7
          assert result["formal_fvm_regression_band_applied"] is False
          assert result["validation"] is False
          assert result["design_evaluation"] is False
          assert result["acceptance_gate"] is False
          assert result["property_backend_design_status"] == "not_approved_for_design_use"
          for case in result["run_plan"]:
              metrics = json.loads(
                  (output / case["case_id"] / "fvm_metrics.json").read_text(encoding="utf-8")
              )
              assert metrics["coolprop_version"] == "8.0.0"
          PY

      - name: Check final diff
        run: |
          git diff --check
          test ! -e .github/workflows/v013a-temporary-verification.yml
          git status --short

      - name: Create evidence bundle
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile, ZipInfo

          source = Path("artifacts/v013a-finalization")
          bundle = Path("artifacts/v013a-finalization-evidence.zip")
          with ZipFile(bundle, "w", compression=ZIP_DEFLATED, compresslevel=9) as archive:
              for path in sorted(p for p in source.rglob("*") if p.is_file()):
                  info = ZipInfo(path.relative_to(source).as_posix())
                  info.date_time = (1980, 1, 1, 0, 0, 0)
                  info.compress_type = ZIP_DEFLATED
                  info.external_attr = 0o100644 << 16
                  archive.writestr(info, path.read_bytes())
          digest = sha256(bundle.read_bytes()).hexdigest()
          Path("artifacts/v013a-finalization-evidence.sha256").write_text(
              f"{digest}  {bundle.name}\n",
              encoding="utf-8",
          )
          print(digest)
          PY

      - name: Commit tested implementation
        id: code_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "Finalize V-013A observation"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Record finalization evidence
        env:
          CODE_SHA: ${{ steps.code_commit.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          def junit_counts(path: str) -> tuple[int, int, int, int, int]:
              root = ET.parse(path).getroot()
              suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
              tests = sum(int(s.attrib.get("tests", 0)) for s in suites)
              failures = sum(int(s.attrib.get("failures", 0)) for s in suites)
              errors = sum(int(s.attrib.get("errors", 0)) for s in suites)
              skipped = sum(int(s.attrib.get("skipped", 0)) for s in suites)
              return tests - failures - errors - skipped, failures, errors, skipped, tests

          focused = junit_counts("artifacts/test-results/v013a-focused-junit.xml")
          full = junit_counts("artifacts/test-results/full-repository-junit.xml")
          metrics = json.loads(
              Path("artifacts/v013a-finalization/v013a_metrics.json").read_text(encoding="utf-8")
          )
          first_case = metrics["run_plan"][0]["case_id"]
          fvm_metrics = json.loads(
              (
                  Path("artifacts/v013a-finalization")
                  / first_case
                  / "fvm_metrics.json"
              ).read_text(encoding="utf-8")
          )
          digest = Path(
              "artifacts/v013a-finalization-evidence.sha256"
          ).read_text(encoding="utf-8").split()[0]

          evidence = f"""

## Finalization rerun

The review fixes were retested and the complete `100 / 200 / 400` observation
was rerun from the exact tested implementation commit below.

```text
tested implementation commit: {os.environ["CODE_SHA"]}
GitHub Actions run:            {os.environ["RUN_ID"]}
focused tests:                 {focused[0]} passed, {focused[3]} skipped
full repository tests:         {full[0]} passed, {full[3]} skipped
planned / executed runs:       {metrics["planned_run_count"]} / {metrics["executed_run_count"]}
comparison plots:              {len(metrics["generated_plots"])} / 7
CoolProp version:              {fvm_metrics["coolprop_version"]}
evidence bundle SHA256:        {digest}
```

This rerun retains `validation = False`, `design_evaluation = False`,
`acceptance_gate = False`, and
`property_backend_design_status = not_approved_for_design_use`.
"""
          notes = Path(
              "docs/verification/stage7_v013a_incident_propagation_observation_notes.md"
          )
          notes.write_text(notes.read_text(encoding="utf-8").rstrip() + evidence + "\n", encoding="utf-8")

          log = Path("docs/verification/stage7_execution_log.md")
          log_append = f"""

### V-013A finalization rerun

- tested implementation commit: `{os.environ["CODE_SHA"]}`
- GitHub Actions run: `{os.environ["RUN_ID"]}`
- focused tests: `{focused[0]} passed`, `{focused[3]} skipped`
- full repository tests: `{full[0]} passed`, `{full[3]} skipped`
- planned / executed runs: `{metrics["planned_run_count"]} / {metrics["executed_run_count"]}`
- comparison plots: `{len(metrics["generated_plots"])} / 7`
- CoolProp version persisted in FVM artifacts: `{fvm_metrics["coolprop_version"]}`
- evidence bundle SHA256: `{digest}`
"""
          log.write_text(log.read_text(encoding="utf-8").rstrip() + log_append + "\n", encoding="utf-8")
          PY
          git add \
            docs/verification/stage7_execution_log.md \
            docs/verification/stage7_v013a_incident_propagation_observation_notes.md
          git commit -m "Record V-013A finalization evidence"
          git diff --check HEAD~1 HEAD

      - name: Push final PR commits
        run: |
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Upload final V-013A evidence
        uses: actions/upload-artifact@v7
        with:
          name: v013a-finalization-${{ steps.code_commit.outputs.sha }}
          path: |
            artifacts/v013a-finalization-evidence.zip
            artifacts/v013a-finalization-evidence.sha256
            artifacts/test-results
          if-no-files-found: error
          retention-days: 14
