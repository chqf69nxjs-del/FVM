name: V-013A Temporary Verification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-v013a:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" "matplotlib>=3.7"

      - name: Compile V-013A source and tests
        run: |
          python -m compileall -q \
            src/liquid_gas_transient/cases/v013_incident_propagation.py \
            src/liquid_gas_transient/plot_v013_incident_propagation_results.py \
            tests/test_v013_incident_propagation.py

      - name: Run V-013A focused tests
        run: |
          mkdir -p artifacts/test-results
          python -m pytest -q \
            tests/test_linear_acoustic_reference.py \
            tests/test_v013_incident_propagation.py \
            --strict-markers \
            --junitxml=artifacts/test-results/v013a-focused-junit.xml

      - name: Run full repository tests
        run: |
          python -m pytest -q \
            --junitxml=artifacts/test-results/full-repository-junit.xml

      - name: Execute full V-013A 100 200 400 observation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from liquid_gas_transient.cases.v013_incident_propagation import (
              V013IncidentPropagationConfig,
              run_v013_incident_propagation,
          )

          output = Path("artifacts/v013a-full")
          result = run_v013_incident_propagation(
              output,
              V013IncidentPropagationConfig(
                  fvm_mesh_cells=(100, 200, 400),
                  generate_plots=True,
              ),
          )
          summary = {
              "planned_run_count": result["planned_run_count"],
              "executed_run_count": result["executed_run_count"],
              "overall_execution_pass": result["overall_execution_pass"],
              "aggregate_analysis_complete": result["aggregate_analysis_complete"],
              "comparison_plots_complete": result["comparison_plots_complete"],
              "generated_plots": result["generated_plots"],
              "runtime_s": result["runtime_s"],
              "summary_rows": result["summary_rows"],
          }
          print(json.dumps(summary, indent=2))
          assert result["planned_run_count"] == 3
          assert result["executed_run_count"] == 3
          assert result["overall_execution_pass"] is True
          assert result["aggregate_analysis_complete"] is True
          assert result["comparison_plots_complete"] is True
          assert len(result["generated_plots"]) == 7
          assert result["formal_fvm_regression_band_applied"] is False
          assert result["validation"] is False
          assert result["design_evaluation"] is False
          assert result["acceptance_gate"] is False
          assert result["property_backend_design_status"] == "not_approved_for_design_use"
          PY

      - name: Upload temporary V-013A artifacts
        uses: actions/upload-artifact@v7
        with:
          name: v013a-incident-propagation-${{ github.sha }}
          path: artifacts
          if-no-files-found: error
          retention-days: 14
