name: Stage 7 HEM Transition Classifier Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage7-hem-transition-classifier-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-transition-classifier:
    name: validate-transition-classifier
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[plotting]"
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check environment
        run: |
          python - <<'PY'
          import sys
          import CoolProp
          import numpy as np

          print("Python:", sys.version)
          print("NumPy:", np.__version__)
          print("CoolProp:", CoolProp.__version__)
          assert CoolProp.__version__ == "8.0.0"
          PY

      - name: Static and diff checks
        run: |
          python -m compileall -q src/liquid_gas_transient
          git diff --check origin/main...HEAD

      - name: Run transition-classifier focused tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_crossing.py \
            --strict-markers \
            --junitxml=artifacts/stage7-transition-classifier-focused-junit.xml

      - name: Assert focused CoolProp test was not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          path = "artifacts/stage7-transition-classifier-focused-junit.xml"
          root = ET.parse(path).getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(
              f"testcases={len(testcases)} skipped={len(skipped)} "
              f"failures={len(failures)} errors={len(errors)}"
          )
          assert len(testcases) >= 1
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Run related Stage 7 HEM tests
        run: |
          python -m pytest -q \
            tests/test_stage7_lco2_hem_phase_classification.py \
            tests/test_stage7_lco2_hem_equilibrium_quality_sync.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_crossing.py \
            --strict-markers \
            --junitxml=artifacts/stage7-transition-classifier-related-junit.xml

      - name: Run full repository tests
        run: |
          python -m pytest -q \
            --strict-markers \
            --junitxml=artifacts/stage7-transition-classifier-full-junit.xml

      - name: Write validation summary
        if: always()
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          lines = ["# Stage 7 HEM Transition Classifier Validation", ""]
          for label, path in (
              ("focused", Path("artifacts/stage7-transition-classifier-focused-junit.xml")),
              ("related", Path("artifacts/stage7-transition-classifier-related-junit.xml")),
              ("full", Path("artifacts/stage7-transition-classifier-full-junit.xml")),
          ):
              if not path.exists():
                  lines.append(f"- {label}: artifact not produced")
                  continue
              root = ET.parse(path).getroot()
              testcases = root.findall(".//testcase")
              skipped = root.findall(".//skipped")
              failures = root.findall(".//failure")
              errors = root.findall(".//error")
              lines.append(
                  f"- {label}: tests={len(testcases)}, skipped={len(skipped)}, "
                  f"failures={len(failures)}, errors={len(errors)}"
              )
          lines.extend(
              [
                  "",
                  "Verification only; no production, Validation, or design-use approval.",
              ]
          )
          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(lines), encoding="utf-8"
          )
          PY

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stage7-transition-classifier-validation-${{ github.run_id }}
          path: artifacts
          if-no-files-found: warn
          retention-days: 14
