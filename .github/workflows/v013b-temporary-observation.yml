name: V-013B Temporary Rigid-Wall Observation

on:
  pull_request:
  push:
    branches:
      - agent/stage7-v013b-rigid-wall-reflection
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v013b-temporary-observation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v013b-observation:
    name: v013b-rigid-wall-observation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src
      PR_EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      ACTIONS_EVENT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v7
        with:
          ref: agent/stage7-v013b-rigid-wall-reflection
          fetch-depth: 0

      - name: Apply reviewed metric and figure fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_if_needed(
              path: Path,
              *,
              marker: str,
              old: str,
              new: str,
          ) -> None:
              text = path.read_text(encoding="utf-8")
              if marker in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"{path}: expected exactly one replacement target, found {count}"
                  )
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          runner = Path("src/liquid_gas_transient/cases/v013_rigid_wall_observation.py")
          replace_if_needed(
              runner,
              marker="field_error_normalization_policy = {",
              old='''    field_rows: list[dict[str, Any]] = []
    analytical_rows: list[dict[str, Any]] = []
    field_metrics: list[dict[str, Any]] = []

    for time_index, (time_value, sample) in enumerate(
''',
              new='''    field_rows: list[dict[str, Any]] = []
    analytical_rows: list[dict[str, Any]] = []
    field_metrics: list[dict[str, Any]] = []
    field_error_normalization_policy = {
        "pressure_perturbation_pa": "analytical_pressure_perturbation_pa",
        "velocity_m_s": "analytical_pressure_perturbation_pa / (rho0 * c0)",
        "a_plus_pa": "analytical_pressure_perturbation_pa",
        "a_minus_pa": "analytical_pressure_perturbation_pa",
    }

    for time_index, (time_value, sample) in enumerate(
''',
          )
          replace_if_needed(
              runner,
              marker='"normalization_policy": dict(field_error_normalization_policy)',
              old='''            "expected_center_x_m": float(sample["expected_center_x_m"]),
            "fvm": {},
            "moc": {},
        }
        characteristic_normalizer = np.asarray(
            analytical_fields["pressure_perturbation_pa"],
            dtype=float,
        )
        for implementation, fields in (("fvm", fvm_fields), ("moc", moc_fields)):
            for key in keys:
                normalizer = (
                    characteristic_normalizer
                    if key in {"a_plus_pa", "a_minus_pa"}
                    else analytical_fields[key]
                )
''',
              new='''            "expected_center_x_m": float(sample["expected_center_x_m"]),
            "normalization_policy": dict(field_error_normalization_policy),
            "fvm": {},
            "moc": {},
        }
        pressure_normalizer = np.asarray(
            analytical_fields["pressure_perturbation_pa"],
            dtype=float,
        )
        velocity_normalizer = pressure_normalizer / (rho0 * c0)
        for implementation, fields in (("fvm", fvm_fields), ("moc", moc_fields)):
            for key in keys:
                if key == "velocity_m_s":
                    normalizer = velocity_normalizer
                elif key in {"a_plus_pa", "a_minus_pa"}:
                    normalizer = pressure_normalizer
                else:
                    normalizer = analytical_fields[key]
''',
          )
          replace_if_needed(
              runner,
              marker='"field_error_normalization_policy": field_error_normalization_policy',
              old='''        "case_role": "rigid_wall_reflection",
        "field_metrics": field_metrics,
''',
              new='''        "case_role": "rigid_wall_reflection",
        "field_error_normalization_policy": field_error_normalization_policy,
        "field_metrics": field_metrics,
''',
          )

          tests = Path("tests/test_v013_rigid_wall_observation.py")
          replace_if_needed(
              tests,
              marker="import math\n",
              old="import inspect\nimport json\n",
              new="import inspect\nimport json\nimport math\n",
          )
          replace_if_needed(
              tests,
              marker="expected_velocity_policy = (",
              old='''    assert comparison["formal_fvm_regression_band_applied"] is False
    assert len(comparison["field_metrics"]) == 7
    assert len(comparison["probe_reflection_metrics"]) == 3
    for probe in comparison["probe_reflection_metrics"]:
''',
              new='''    assert comparison["formal_fvm_regression_band_applied"] is False
    assert len(comparison["field_metrics"]) == 7
    assert len(comparison["probe_reflection_metrics"]) == 3
    expected_velocity_policy = (
        "analytical_pressure_perturbation_pa / (rho0 * c0)"
    )
    assert comparison["field_error_normalization_policy"]["velocity_m_s"] == (
        expected_velocity_policy
    )
    wall_contact = next(
        sample
        for sample in comparison["field_metrics"]
        if sample["phase"] == "wall_contact"
    )
    for sample in comparison["field_metrics"]:
        assert sample["normalization_policy"]["velocity_m_s"] == (
            expected_velocity_policy
        )
        for implementation in ("fvm", "moc"):
            velocity_metrics = sample[implementation]["velocity_m_s"]
            for metric_name in (
                "l1_relative",
                "l2_relative",
                "linf_relative",
                "linf_absolute",
            ):
                assert math.isfinite(float(velocity_metrics[metric_name]))
    assert wall_contact["fvm"]["velocity_m_s"]["l2_relative"] < 1.0e6
    assert wall_contact["moc"]["velocity_m_s"]["l2_relative"] < 1.0e6
    for probe in comparison["probe_reflection_metrics"]:
''',
          )

          plotter = Path("src/liquid_gas_transient/plot_v013_rigid_wall_results.py")
          replace_if_needed(
              plotter,
              marker='abs(float(wall["max_abs_wall_velocity_m_s"])) / velocity_scale',
              old='''        floor = np.finfo(float).tiny
        velocity_residuals: list[float] = []
        pressure_errors: list[float] = []
        for row in run_data:
            fvm = row["fvm"]
            wall = fvm["boundary_metrics"]
            velocity_scale = amplitude / (
                float(fvm["rho0_kg_m3"]) * float(fvm["c0_m_s"])
            )
            velocity_residuals.append(
                max(
                    abs(float(wall["max_abs_wall_velocity_m_s"]))
                    / velocity_scale,
                    floor,
                )
            )
            pressure_errors.append(
                max(
                    abs(float(wall["wall_pressure_amplification_ratio"]) - 2.0),
                    floor,
                )
            )
''',
              new='''        velocity_residuals: list[float] = []
        pressure_errors: list[float] = []
        for row in run_data:
            fvm = row["fvm"]
            wall = fvm["boundary_metrics"]
            velocity_scale = amplitude / (
                float(fvm["rho0_kg_m3"]) * float(fvm["c0_m_s"])
            )
            velocity_residuals.append(
                abs(float(wall["max_abs_wall_velocity_m_s"])) / velocity_scale
            )
            pressure_errors.append(
                abs(float(wall["wall_pressure_amplification_ratio"]) - 2.0)
            )
''',
          )
          replace_if_needed(
              plotter,
              marker='ax.ticklabel_format(axis="y", style="sci", scilimits=(-3, 3))',
              old='''        ax.set_yscale("log")
        ax.set_title("V-013B rigid-wall condition residuals")
        ax.set_xlabel("mesh spacing Δx [m]")
        ax.set_ylabel("normalized residual [-]")
        ax.grid(True, alpha=0.3, which="both")
        ax.legend(fontsize=8)
''',
              new='''        ax.axhline(0.0, linewidth=0.8)
        ax.set_ylim(bottom=0.0)
        ax.set_title("V-013B rigid-wall condition residuals")
        ax.set_xlabel("mesh spacing Δx [m]")
        ax.set_ylabel("normalized residual [-]")
        ax.ticklabel_format(axis="y", style="sci", scilimits=(-3, 3))
        ax.grid(True, alpha=0.3)
        ax.legend(fontsize=8)
''',
          )
          PY

          git diff --check
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              src/liquid_gas_transient/cases/v013_rigid_wall_observation.py \
              src/liquid_gas_transient/plot_v013_rigid_wall_results.py \
              tests/test_v013_rigid_wall_observation.py
            git commit -m "[v013b-metric-fix] Fix reflection metric normalization and plots"
            git push origin HEAD:agent/stage7-v013b-rigid-wall-reflection
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" "matplotlib>=3.7"

      - name: Check environment and diff
        run: |
          python - <<'PY'
          import CoolProp
          import matplotlib
          print("CoolProp:", CoolProp.__version__)
          print("matplotlib:", matplotlib.__version__)
          assert CoolProp.__version__ == "8.0.0"
          PY
          git diff --check

      - name: Run focused V-013B tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/v013b-validation
          python -m pytest -q \
            tests/test_linear_acoustic_reference.py \
            tests/test_v013_rigid_wall_reflection.py \
            tests/test_v013_rigid_wall_observation.py \
            --strict-markers \
            --junitxml=artifacts/v013b-validation/focused-junit.xml \
            | tee artifacts/v013b-validation/focused-tests.txt

      - name: Run full repository tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            --strict-markers \
            --junitxml=artifacts/v013b-validation/full-junit.xml \
            | tee artifacts/v013b-validation/full-tests.txt

      - name: Execute fixed three-mesh observation
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/v013b-observation
          python -m liquid_gas_transient.cases.v013_rigid_wall_observation \
            artifacts/v013b-observation \
            | tee artifacts/v013b-validation/observation-run.txt

      - name: Generate seven figures from saved artifacts
        shell: bash
        run: |
          set -o pipefail
          python -m liquid_gas_transient.plot_v013_rigid_wall_results \
            artifacts/v013b-observation \
            | tee artifacts/v013b-validation/plot-run.txt

      - name: Validate and summarize observation artifacts
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          import hashlib
          import json
          import math
          import os
          from pathlib import Path
          import subprocess
          import xml.etree.ElementTree as ET

          observation = Path("artifacts/v013b-observation")
          validation = Path("artifacts/v013b-validation")

          metrics = json.loads((observation / "v013b_metrics.json").read_text(encoding="utf-8"))
          plot_metrics = json.loads((observation / "v013b_plot_metrics.json").read_text(encoding="utf-8"))
          with (observation / "v013b_summary.csv").open(encoding="utf-8", newline="") as stream:
              summary_rows = list(csv.DictReader(stream))

          assert metrics["planned_run_count"] == 3
          assert metrics["executed_run_count"] == 3
          assert metrics["overall_execution_pass"] is True
          assert metrics["aggregate_analysis_complete"] is True
          assert metrics["comparison_plots_complete"] is True
          assert metrics["reference_calls_coolprop"] is False
          assert metrics["production_solver_behavior_changed"] is False
          assert metrics["validation"] is False
          assert metrics["design_evaluation"] is False
          assert metrics["acceptance_gate"] is False
          assert metrics["formal_fvm_regression_band_applied"] is False
          assert metrics["property_backend_design_status"] == "not_approved_for_design_use"
          assert metrics["coolprop_version"] == "8.0.0"

          assert plot_metrics["plot_count"] == 7
          assert plot_metrics["expected_plot_count"] == 7
          assert plot_metrics["plotting_errors"] == {}
          assert plot_metrics["solver_rerun"] is False
          assert plot_metrics["numerical_results_changed"] is False

          assert len(summary_rows) == 3
          assert {int(float(row["n_cells"])) for row in summary_rows} == {100, 200, 400}
          assert all(row["execution_pass"] == "True" for row in summary_rows)
          assert all(row["fvm_health_pass"] == "True" for row in summary_rows)
          assert all(row["moc_reference_pass"] == "True" for row in summary_rows)
          assert all(row["fvm_expected_reflection_signs_observed"] == "True" for row in summary_rows)
          assert all(math.isfinite(float(row["max_fvm_velocity_l2_relative"])) for row in summary_rows)
          assert all(float(row["max_fvm_velocity_l2_relative"]) < 1.0e6 for row in summary_rows)

          png_files = sorted(path.name for path in observation.glob("*.png"))
          assert len(png_files) == 7

          def junit_counts(path: Path) -> dict[str, int]:
              root = ET.parse(path).getroot()
              cases = root.findall(".//testcase")
              failures = sum(case.find("failure") is not None for case in cases)
              errors = sum(case.find("error") is not None for case in cases)
              skipped = sum(case.find("skipped") is not None for case in cases)
              return {
                  "total": len(cases),
                  "passed": len(cases) - failures - errors - skipped,
                  "failures": failures,
                  "errors": errors,
                  "skipped": skipped,
              }

          source_commit = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          evidence = {
              "source_commit": source_commit,
              "pr_event_head_sha": os.environ["PR_EVENT_HEAD_SHA"],
              "actions_event_sha": os.environ["ACTIONS_EVENT_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "coolprop_version": metrics["coolprop_version"],
              "focused_tests": junit_counts(validation / "focused-junit.xml"),
              "full_tests": junit_counts(validation / "full-junit.xml"),
              "planned_run_count": metrics["planned_run_count"],
              "executed_run_count": metrics["executed_run_count"],
              "overall_execution_pass": metrics["overall_execution_pass"],
              "plot_count": plot_metrics["plot_count"],
              "plotting_errors": plot_metrics["plotting_errors"],
              "solver_rerun_during_plotting": plot_metrics["solver_rerun"],
              "numerical_results_changed_during_plotting": plot_metrics["numerical_results_changed"],
              "summary_rows": summary_rows,
              "png_files": png_files,
              "guardrails": {
                  "validation": metrics["validation"],
                  "design_evaluation": metrics["design_evaluation"],
                  "acceptance_gate": metrics["acceptance_gate"],
                  "formal_fvm_regression_band_applied": metrics["formal_fvm_regression_band_applied"],
                  "property_backend_design_status": metrics["property_backend_design_status"],
                  "reference_calls_coolprop": metrics["reference_calls_coolprop"],
                  "production_solver_behavior_changed": metrics["production_solver_behavior_changed"],
              },
          }
          (validation / "execution-evidence.json").write_text(
              json.dumps(evidence, ensure_ascii=False, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )

          entries = []
          for root in (observation, validation):
              for path in sorted(root.rglob("*")):
                  if not path.is_file() or path.name == "artifact-manifest.json":
                      continue
                  entries.append(
                      {
                          "relative_path": path.as_posix(),
                          "size_bytes": path.stat().st_size,
                          "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      }
                  )
          manifest = {
              "source_commit": source_commit,
              "pr_event_head_sha": os.environ["PR_EVENT_HEAD_SHA"],
              "actions_event_sha": os.environ["ACTIONS_EVENT_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "entry_count": len(entries),
              "entries": entries,
          }
          (validation / "artifact-manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )

          print(json.dumps(evidence, ensure_ascii=False, indent=2))
          print("manifest entries:", len(entries))
          PY

      - name: Upload V-013B observation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: v013b-rigid-wall-observation-${{ github.run_id }}
          path: |
            artifacts/v013b-observation/**
            artifacts/v013b-validation/**
          if-no-files-found: error
          retention-days: 14
