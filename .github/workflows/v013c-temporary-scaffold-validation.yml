name: V-013C Temporary Scaffold Validation

on:
  pull_request:
  push:
    branches:
      - agent/stage7-v013c-fixed-pressure-reflection
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v013c-temporary-scaffold-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-v013c-scaffold:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" "matplotlib>=3.7"

      - name: Check environment and diff
        run: |
          python - <<'PY'
          import CoolProp
          print("CoolProp:", CoolProp.__version__)
          assert CoolProp.__version__ == "8.0.0"
          PY
          git diff --check

      - name: Run focused V-013C tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/v013c-scaffold-validation
          python -m pytest -q \
            tests/test_linear_acoustic_reference.py \
            tests/test_v013_fixed_pressure_reflection.py \
            --strict-markers \
            --junitxml=artifacts/v013c-scaffold-validation/focused-junit.xml \
            | tee artifacts/v013c-scaffold-validation/focused-tests.txt

      - name: Run full repository tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            --strict-markers \
            --junitxml=artifacts/v013c-scaffold-validation/full-junit.xml \
            | tee artifacts/v013c-scaffold-validation/full-tests.txt

      - name: Summarize validation
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          base = Path("artifacts/v013c-scaffold-validation")

          def counts(path: Path) -> dict[str, int]:
              root = ET.parse(path).getroot()
              cases = root.findall(".//testcase")
              failures = sum(case.find("failure") is not None for case in cases)
              errors = sum(case.find("error") is not None for case in cases)
              skipped = sum(case.find("skipped") is not None for case in cases)
              return {
                  "total": len(cases),
                  "passed": len(cases) - failures - errors - skipped,
                  "failures": failures,
                  "errors": errors,
                  "skipped": skipped,
              }

          evidence = {
              "source_commit": os.environ["GITHUB_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "coolprop_version": "8.0.0",
              "focused_tests": counts(base / "focused-junit.xml"),
              "full_tests": counts(base / "full-junit.xml"),
              "git_diff_check": "success",
              "production_solver_behavior_changed": False,
              "validation": False,
              "design_evaluation": False,
              "acceptance_gate": False,
          }
          (base / "execution-evidence.json").write_text(
              json.dumps(evidence, ensure_ascii=False, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(evidence, ensure_ascii=False, indent=2))
          PY

      - name: Upload V-013C scaffold evidence
        uses: actions/upload-artifact@v7
        with:
          name: v013c-scaffold-validation-${{ github.run_id }}
          path: artifacts/v013c-scaffold-validation/**
          if-no-files-found: error
          retention-days: 14
