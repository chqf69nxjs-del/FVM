name: Stage 7 Projected Liquid Crossing Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage7-projected-liquid-crossing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-projected-liquid-crossing:
    name: validate-projected-liquid-crossing
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[plotting]"
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check environment
        run: |
          python - <<'PY'
          import sys
          import CoolProp
          import numpy as np

          print("Python:", sys.version)
          print("NumPy:", np.__version__)
          print("CoolProp:", CoolProp.__version__)
          assert CoolProp.__version__ == "8.0.0"
          PY

      - name: Static and diff checks
        run: |
          python -m compileall -q src/liquid_gas_transient
          git diff --check origin/main...HEAD

      - name: Run projected dry-run focused tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_projected_fvm_dry_run.py \
            --strict-markers \
            --junitxml=artifacts/stage7-projected-crossing-focused-junit.xml

      - name: Assert installed CoolProp test was not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          path = "artifacts/stage7-projected-crossing-focused-junit.xml"
          root = ET.parse(path).getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(
              f"testcases={len(testcases)} skipped={len(skipped)} "
              f"failures={len(failures)} errors={len(errors)}"
          )
          assert len(testcases) >= 12
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Run fixed projected dry-run matrix
        run: |
          python -m \
            liquid_gas_transient.hem_liquid_to_two_phase_projected_fvm_dry_run \
            --output-dir artifacts/projected-fvm-dry-run

      - name: Validate projected evidence flags
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "artifacts/projected-fvm-dry-run/"
              "stage7_lco2_hem_projected_fvm_dry_run.json"
          )
          payload = json.loads(path.read_text(encoding="utf-8"))
          assert payload["scope"] == "verification_only"
          assert payload["raw_first_order_fvm_crossing_observed"] is True
          assert payload["equilibrium_quality_projection_exercised"] is True
          assert payload["post_projection_accepted_eos_exercised"] is True
          assert payload["second_projection_noop_exercised"] is True
          assert payload["phase_vapor_budget_exercised"] is True
          assert payload["complete_one_step_crossing_path_observed"] is True
          assert payload["actual_first_order_fvm_crossing_verified"] is False
          assert payload["case_a_frozen"] is False
          assert payload["case_b_frozen"] is False
          assert payload["algorithms_or_tolerances_tuned"] is False
          assert payload["production_hem_activation_approved"] is False
          assert payload["physical_validation"] is False
          assert payload["design_use_acceptance"] is False

          by_id = {case["case_id"]: case for case in payload["cases"]}
          strong = by_id["strong_p5m5_to_p2m5"]
          moderate = by_id["moderate_p5m5_to_p3m5"]
          control = by_id["control_p5m5_to_p4m5"]

          assert strong["outcome"] == "ACCEPTED_CROSSING"
          assert moderate["outcome"] == "ACCEPTED_CROSSING"
          assert control["outcome"] == "ACCEPTED_ALL_LIQUID_NOOP"
          assert strong["crossing_cell_indices"] == [3, 4]
          assert strong["first_projection_cell_indices"] == [3, 4]
          assert moderate["crossing_cell_indices"] == [4]
          assert moderate["first_projection_cell_indices"] == [4]
          assert control["first_projection_cell_indices"] == []

          for case in payload["cases"]:
              assert case["second_projection_cell_indices"] == []
              assert case["max_post_quality_mismatch"] <= 1.0e-12
              assert case["post_accepted_state_eos_exercised"] is True
              budget = case["budget_diagnostics"]
              assert abs(budget["phase_vapor_mass_balance_residual_kg"]) <= 1.0e-12
              assert abs(budget["projection_source_consistency_residual_kg"]) <= 1.0e-12
              assert abs(budget["combined_post_vapor_balance_residual_kg"]) <= 1.0e-12

          print(json.dumps({
              case_id: {
                  "outcome": case["outcome"],
                  "crossing_cells": case["crossing_cell_indices"],
                  "projection_cells": case["first_projection_cell_indices"],
                  "projection_vapor_source_kg": case["budget_diagnostics"].get(
                      "projection_vapor_source_kg"
                  ),
              }
              for case_id, case in by_id.items()
          }, indent=2))
          PY

      - name: Run related Stage 7 HEM tests
        run: |
          python -m pytest -q \
            tests/test_stage7_lco2_hem_phase_classification.py \
            tests/test_stage7_lco2_hem_equilibrium_sound_speed.py \
            tests/test_stage7_lco2_hem_uniform_state_preservation.py \
            tests/test_stage7_lco2_hem_equilibrium_quality_sync.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_crossing.py \
            tests/test_stage7_lco2_hem_mixed_liquid_open_two_phase_eos.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_state_pair_survey.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_minimal_fvm_dry_run.py \
            tests/test_stage7_lco2_hem_liquid_to_two_phase_projected_fvm_dry_run.py \
            --strict-markers \
            --junitxml=artifacts/stage7-projected-crossing-related-junit.xml

      - name: Run full repository tests
        run: |
          python -m pytest -q \
            --strict-markers \
            --junitxml=artifacts/stage7-projected-crossing-full-junit.xml

      - name: Write validation summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          lines = ["# Stage 7 Projected Liquid Crossing Validation", ""]
          for label, path in (
              (
                  "focused",
                  Path("artifacts/stage7-projected-crossing-focused-junit.xml"),
              ),
              (
                  "related",
                  Path("artifacts/stage7-projected-crossing-related-junit.xml"),
              ),
              (
                  "full",
                  Path("artifacts/stage7-projected-crossing-full-junit.xml"),
              ),
          ):
              if not path.exists():
                  lines.append(f"- {label}: artifact not produced")
                  continue
              root = ET.parse(path).getroot()
              testcases = root.findall(".//testcase")
              skipped = root.findall(".//skipped")
              failures = root.findall(".//failure")
              errors = root.findall(".//error")
              lines.append(
                  f"- {label}: tests={len(testcases)}, skipped={len(skipped)}, "
                  f"failures={len(failures)}, errors={len(errors)}"
              )

          evidence = Path(
              "artifacts/projected-fvm-dry-run/"
              "stage7_lco2_hem_projected_fvm_dry_run.json"
          )
          if evidence.exists():
              payload = json.loads(evidence.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      "",
                      f"- accepted crossing cases: {payload['accepted_crossing_case_ids']}",
                      f"- liquid no-op cases: {payload['accepted_liquid_noop_case_ids']}",
                      "- complete one-step crossing path observed: "
                      f"{payload['complete_one_step_crossing_path_observed']}",
                  ]
              )

          lines.extend(
              [
                  "",
                  "Verification only. Formal Case A/B freeze, production, physical "
                  "Validation, acoustic-band, and design-use approval remain false.",
              ]
          )
          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(lines),
              encoding="utf-8",
          )
          PY

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stage7-projected-liquid-crossing-validation-${{ github.run_id }}
          path: artifacts
          if-no-files-found: warn
          retention-days: 14
