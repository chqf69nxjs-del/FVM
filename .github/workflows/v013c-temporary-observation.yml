name: V-013C Temporary Fixed-Pressure Observation

on:
  pull_request:
  push:
    branches:
      - agent/stage7-v013c-fixed-pressure-reflection
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v013c-temporary-observation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v013c-observation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg
      PR_EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      ACTIONS_EVENT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout source head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" "matplotlib>=3.7"

      - name: Check environment and committed diff
        run: |
          python - <<'PY'
          import CoolProp
          import matplotlib
          print("CoolProp:", CoolProp.__version__)
          print("matplotlib:", matplotlib.__version__)
          assert CoolProp.__version__ == "8.0.0"
          PY
          git fetch --no-tags origin main
          git diff --check origin/main...HEAD

      - name: Run focused V-013C tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/v013c-validation
          python -m pytest -q \
            tests/test_linear_acoustic_reference.py \
            tests/test_v013_fixed_pressure_reflection.py \
            tests/test_v013_fixed_pressure_observation.py \
            --strict-markers \
            --junitxml=artifacts/v013c-validation/focused-junit.xml \
            | tee artifacts/v013c-validation/focused-tests.txt

      - name: Run full repository tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            --strict-markers \
            --junitxml=artifacts/v013c-validation/full-junit.xml \
            | tee artifacts/v013c-validation/full-tests.txt

      - name: Execute fixed three-mesh observation
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/v013c-observation
          python -m liquid_gas_transient.cases.v013_fixed_pressure_observation \
            artifacts/v013c-observation \
            | tee artifacts/v013c-validation/observation-run.txt

      - name: Generate seven figures from saved artifacts
        shell: bash
        run: |
          set -o pipefail
          python -m liquid_gas_transient.plot_v013_fixed_pressure_results \
            artifacts/v013c-observation \
            | tee artifacts/v013c-validation/plot-run.txt

      - name: Validate and summarize observation artifacts
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          import hashlib
          import json
          import math
          import os
          from pathlib import Path
          import subprocess
          import xml.etree.ElementTree as ET

          observation = Path("artifacts/v013c-observation")
          validation = Path("artifacts/v013c-validation")

          metrics = json.loads(
              (observation / "v013c_metrics.json").read_text(encoding="utf-8")
          )
          plot_metrics = json.loads(
              (observation / "v013c_plot_metrics.json").read_text(encoding="utf-8")
          )
          reference = json.loads(
              (observation / "v013c_reference_constants.json").read_text(
                  encoding="utf-8"
              )
          )
          with (observation / "v013c_summary.csv").open(
              encoding="utf-8", newline=""
          ) as stream:
              summary_rows = list(csv.DictReader(stream))

          assert metrics["planned_run_count"] == 3
          assert metrics["executed_run_count"] == 3
          assert metrics["overall_execution_pass"] is True
          assert metrics["aggregate_analysis_complete"] is True
          assert metrics["comparison_plots_complete"] is True
          assert metrics["reference_calls_coolprop"] is False
          assert metrics["production_solver_behavior_changed"] is False
          assert metrics["validation"] is False
          assert metrics["design_evaluation"] is False
          assert metrics["acceptance_gate"] is False
          assert metrics["formal_fvm_regression_band_applied"] is False
          assert metrics["fixed_pressure_boundary_allows_nonzero_mass_flux"] is True
          assert metrics["fixed_pressure_boundary_allows_nonzero_energy_flux"] is True
          assert plot_metrics["plot_count"] == 7
          assert plot_metrics["expected_plot_count"] == 7
          assert plot_metrics["plotting_errors"] == {}
          assert plot_metrics["solver_rerun"] is False
          assert plot_metrics["numerical_results_changed"] is False
          assert plot_metrics["coolprop_version"] == "8.0.0"
          assert reference["coolprop_version"] == "8.0.0"
          assert reference["moc_calls_coolprop"] is False
          assert [int(row["n_cells"]) for row in summary_rows] == [100, 200, 400]
          assert all(row["execution_pass"] == "True" for row in summary_rows)

          for row in summary_rows:
              assert float(row["mean_fvm_pressure_reflection_coefficient"]) < 0.0
              assert float(row["mean_fvm_velocity_reflection_coefficient"]) > 0.0
              for key in (
                  "normalized_fixed_pressure_residual",
                  "boundary_velocity_amplification_ratio",
                  "boundary_velocity_amplification_error",
                  "integrated_right_boundary_mass_kg",
                  "integrated_right_boundary_energy_j",
                  "max_fvm_pressure_l2_relative",
                  "max_fvm_velocity_l2_relative",
              ):
                  assert math.isfinite(float(row[key]))

              case_id = row["case_id"]
              run_dir = observation / case_id
              fvm = json.loads(
                  (run_dir / "fvm_metrics.json").read_text(encoding="utf-8")
              )
              comparison = json.loads(
                  (run_dir / "comparison_metrics.json").read_text(encoding="utf-8")
              )
              boundary = fvm["boundary_metrics"]
              assert fvm["overall_fvm_health_pass"] is True
              assert fvm["solver_physics_changed"] is False
              assert boundary["boundary_window_sample_count"] > 0
              assert boundary["zero_mass_flux_expected"] is False
              assert boundary["zero_energy_flux_expected"] is False
              assert comparison["comparison_analysis_complete"] is True
              assert comparison["fvm_expected_reflection_signs_observed"] is True
              assert comparison["formal_fvm_regression_band_applied"] is False
              for sample in comparison["field_metrics"]:
                  for implementation in ("fvm", "moc"):
                      for field in (
                          "pressure_perturbation_pa",
                          "velocity_m_s",
                          "a_plus_pa",
                          "a_minus_pa",
                      ):
                          for metric_name, value in sample[implementation][field].items():
                              if metric_name.endswith("relative") or metric_name == "linf_absolute":
                                  assert math.isfinite(float(value))

          def counts(path: Path) -> dict[str, int]:
              root = ET.parse(path).getroot()
              cases = root.findall(".//testcase")
              failures = sum(case.find("failure") is not None for case in cases)
              errors = sum(case.find("error") is not None for case in cases)
              skipped = sum(case.find("skipped") is not None for case in cases)
              return {
                  "total": len(cases),
                  "passed": len(cases) - failures - errors - skipped,
                  "failures": failures,
                  "errors": errors,
                  "skipped": skipped,
              }

          source_commit = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          evidence = {
              "source_commit": source_commit,
              "pr_head_sha": os.environ["PR_EVENT_HEAD_SHA"],
              "actions_merge_sha": os.environ["ACTIONS_EVENT_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "committed_diff_range": "origin/main...HEAD",
              "committed_diff_check": "success",
              "coolprop_version": "8.0.0",
              "focused_tests": counts(validation / "focused-junit.xml"),
              "full_tests": counts(validation / "full-junit.xml"),
              "planned_runs": metrics["planned_run_count"],
              "executed_runs": metrics["executed_run_count"],
              "plot_count": plot_metrics["plot_count"],
              "plotting_errors": plot_metrics["plotting_errors"],
              "solver_rerun_during_plotting": plot_metrics["solver_rerun"],
              "numerical_results_changed_during_plotting": plot_metrics[
                  "numerical_results_changed"
              ],
              "summary_rows": summary_rows,
              "production_solver_behavior_changed": False,
              "validation": False,
              "design_evaluation": False,
              "acceptance_gate": False,
          }
          (validation / "execution-evidence.json").write_text(
              json.dumps(evidence, ensure_ascii=False, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )

          entries = []
          for root in (observation, validation):
              for path in sorted(root.rglob("*")):
                  if not path.is_file() or path.name == "artifact-manifest.json":
                      continue
                  entries.append(
                      {
                          "path": path.as_posix(),
                          "size_bytes": path.stat().st_size,
                          "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      }
                  )
          manifest = {
              "source_commit": source_commit,
              "pr_head_sha": os.environ["PR_EVENT_HEAD_SHA"],
              "actions_merge_sha": os.environ["ACTIONS_EVENT_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "entry_count": len(entries),
              "entries": entries,
          }
          (validation / "artifact-manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(evidence, ensure_ascii=False, indent=2))
          print("artifact entries:", len(entries))
          PY

      - name: Upload V-013C observation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: v013c-fixed-pressure-observation-${{ github.run_id }}
          path: |
            artifacts/v013c-observation/**
            artifacts/v013c-validation/**
          if-no-files-found: error
          retention-days: 14
