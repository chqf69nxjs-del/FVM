name: V-012D Source Snapshot

on:
  push:
    branches:
      - agent/stage6-v012d-closing-ramp
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create source archive
        shell: bash
        run: tar --exclude=.git -czf v012d-source.tar.gz .

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: v012d-source-${{ github.run_id }}
          path: v012d-source.tar.gz
          retention-days: 1
          if-no-files-found: error
