name: V-012D Temporary Verification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage6-v012d-closing-ramp
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Prepare diagnostics directory
        shell: bash
        run: |
          rm -rf ci-v012d verification/internal_valve_closing_ramp_baseline
          mkdir -p ci-v012d
      - name: Install verification dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pip install -e . 'CoolProp==8.0.0' 'matplotlib>=3.7' pytest ruff \
            2>&1 | tee ci-v012d/install.txt
      - name: Static checks
        id: static
        if: always() && steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python - <<'PY'
          import CoolProp, matplotlib, numpy, pytest
          print('CoolProp', CoolProp.__version__)
          print('matplotlib', matplotlib.__version__)
          print('numpy', numpy.__version__)
          print('pytest', pytest.__version__)
          PY
            ruff check \
              src/liquid_gas_transient/cases/internal_valve_closing_ramp_config.py \
              src/liquid_gas_transient/cases/coolprop_internal_valve_closing_ramp.py \
              src/liquid_gas_transient/cases/coolprop_internal_valve_closing_ramp_artifacts.py \
              src/liquid_gas_transient/plot_internal_valve_closing_ramp_results.py \
              tests/test_coolprop_internal_valve_closing_ramp.py \
              tests/test_coolprop_internal_valve_closing_ramp_plots.py
            ruff format --check \
              src/liquid_gas_transient/cases/internal_valve_closing_ramp_config.py \
              src/liquid_gas_transient/cases/coolprop_internal_valve_closing_ramp.py \
              src/liquid_gas_transient/cases/coolprop_internal_valve_closing_ramp_artifacts.py \
              src/liquid_gas_transient/plot_internal_valve_closing_ramp_results.py \
              tests/test_coolprop_internal_valve_closing_ramp.py \
              tests/test_coolprop_internal_valve_closing_ramp_plots.py
          } 2>&1 | tee ci-v012d/static-checks.txt
      - name: Focused V-012D tests
        id: focused
        if: always() && steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          PYTHONPATH: src
          MPLBACKEND: Agg
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/test_coolprop_internal_valve_closing_ramp.py \
            tests/test_coolprop_internal_valve_closing_ramp_plots.py \
            2>&1 | tee ci-v012d/focused-tests.txt
      - name: Generate V-012D baseline and review plots
        id: artifacts
        if: always() && steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          PYTHONPATH: src
          MPLBACKEND: Agg
        run: |
          set -o pipefail
          python -m liquid_gas_transient.cases.coolprop_internal_valve_closing_ramp_artifacts \
            verification/internal_valve_closing_ramp_baseline \
            2>&1 | tee ci-v012d/artifact-wrapper.txt
      - name: Validate baseline metrics
        id: metrics
        if: always() && steps.artifacts.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY' 2>&1 | tee ci-v012d/metrics-summary.txt
          import json
          from pathlib import Path
          path = Path('verification/internal_valve_closing_ramp_baseline/coolprop_internal_valve_closing_ramp_metrics.json')
          metrics = json.loads(path.read_text(encoding='utf-8'))
          summary = {
              'verification_item': metrics.get('verification_item'),
              'overall_observation_execution_pass': metrics.get('overall_observation_execution_pass'),
              'step_count': metrics.get('step_count'),
              'final_time_s': metrics.get('final_time_s'),
              'target_time_s': metrics.get('target_time_s'),
              'first_boundary_arrival_time_s': metrics.get('first_boundary_arrival_time_s'),
              'post_closure_sample_count': metrics.get('post_closure_sample_count'),
              'upstream_compression_observed': metrics.get('upstream_compression_observed'),
              'downstream_decompression_observed': metrics.get('downstream_decompression_observed'),
              'final_applied_q_m3_s': metrics.get('final_applied_q_m3_s'),
              'max_abs_post_closure_applied_q_m3_s': metrics.get('max_abs_post_closure_applied_q_m3_s'),
          }
          print(json.dumps(summary, indent=2))
          if summary['verification_item'] != 'V-012D':
              raise SystemExit('unexpected verification item')
          if not summary['overall_observation_execution_pass']:
              raise SystemExit('overall observation execution pass is false')
          PY
      - name: Full repository test suite
        id: full
        if: always() && steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          PYTHONPATH: src
          MPLBACKEND: Agg
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee ci-v012d/full-tests.txt
      - name: Write verification status
        if: always()
        shell: bash
        env:
          INSTALL: ${{ steps.install.outcome }}
          STATIC: ${{ steps.static.outcome }}
          FOCUSED: ${{ steps.focused.outcome }}
          ARTIFACTS: ${{ steps.artifacts.outcome }}
          METRICS: ${{ steps.metrics.outcome }}
          FULL: ${{ steps.full.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          keys = ('INSTALL', 'STATIC', 'FOCUSED', 'ARTIFACTS', 'METRICS', 'FULL')
          status = {key.lower(): os.environ[key] for key in keys}
          status['overall_pass'] = all(value == 'success' for value in status.values())
          with open('ci-v012d/status.json', 'w', encoding='utf-8') as stream:
              json.dump(status, stream, indent=2)
              stream.write('\n')
          print(json.dumps(status, indent=2))
          PY
      - name: Upload V-012D diagnostics and generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v012d-diagnostics-${{ github.sha }}
          path: |
            ci-v012d
            verification/internal_valve_closing_ramp_baseline
          if-no-files-found: warn
          retention-days: 14
      - name: Enforce verification result
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          status = json.load(open('ci-v012d/status.json', encoding='utf-8'))
          raise SystemExit(0 if status['overall_pass'] else 1)
          PY
