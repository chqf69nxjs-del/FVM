name: V-012D Adjust Mini-Run Window

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage6-v012d-closing-ramp
          fetch-depth: 0
      - name: Use computed probe-complete target time in mini-runs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          paths = (
              Path('tests/test_coolprop_internal_valve_closing_ramp.py'),
              Path('tests/test_coolprop_internal_valve_closing_ramp_plots.py'),
          )
          old = '''        post_closure_hold_s=0.005,
                  t_end_s=0.015,
                  max_steps=1000,
          '''
          new = '''        post_closure_hold_s=0.005,
                  max_steps=1000,
          '''
          for path in paths:
              text = path.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'unexpected mini-run target block count in {path}: {text.count(old)}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python -m pip install ruff
          ruff format \
            tests/test_coolprop_internal_valve_closing_ramp.py \
            tests/test_coolprop_internal_valve_closing_ramp_plots.py
          ruff check \
            tests/test_coolprop_internal_valve_closing_ramp.py \
            tests/test_coolprop_internal_valve_closing_ramp_plots.py
          rm -f .github/workflows/v012d-adjust-mini-run-window.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/v012d-adjust-mini-run-window.yml \
            tests/test_coolprop_internal_valve_closing_ramp.py \
            tests/test_coolprop_internal_valve_closing_ramp_plots.py
          git diff --cached --check
          git commit -m "Use computed V-012D mini-run observation window"
          git push origin HEAD:agent/stage6-v012d-closing-ramp
