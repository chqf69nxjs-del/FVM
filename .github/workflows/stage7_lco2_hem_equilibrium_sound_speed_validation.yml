name: Stage 7 LCO2 HEM Equilibrium Sound-Speed Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONPATH: src
      OUTPUT_DIR: ${{ runner.temp }}/stage7_lco2_hem_equilibrium_sound_speed

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Confirm clean checkout
        run: test -z "$(git status --porcelain --untracked-files=no)"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[plotting]"
          python -m pip install pytest "CoolProp==8.0.0"

      - name: Smoke check environment
        run: |
          python - <<'PY'
          import CoolProp
          import matplotlib
          from liquid_gas_transient import hem_equilibrium_sound_speed
          print("CoolProp", CoolProp.__version__)
          print("Matplotlib", matplotlib.__version__)
          print("module", hem_equilibrium_sound_speed.__name__)
          assert CoolProp.__version__ == "8.0.0"
          PY

      - name: Run focused HEM acoustic tests
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            tests/test_stage7_lco2_hem_thermodynamic_scaffold.py \
            tests/test_stage7_lco2_hem_phase_classification.py \
            tests/test_stage7_lco2_hem_equilibrium_sound_speed.py \
            tests/test_coolprop_backend_installed.py \
            --junitxml=artifacts/stage7-hem-sound-speed-focused-junit.xml

      - name: Assert focused tests were not skipped
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("artifacts/stage7-hem-sound-speed-focused-junit.xml").getroot()
          testcases = root.findall(".//testcase")
          skipped = root.findall(".//skipped")
          failures = root.findall(".//failure")
          errors = root.findall(".//error")
          print(len(testcases), len(skipped), len(failures), len(errors))
          assert len(testcases) >= 50
          assert len(skipped) == 0
          assert len(failures) == 0
          assert len(errors) == 0
          PY

      - name: Generate equilibrium sound-speed evidence
        run: |
          python -m liquid_gas_transient.hem_equilibrium_sound_speed \
            --output-dir "$OUTPUT_DIR"
          find "$OUTPUT_DIR" -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Validate equilibrium sound-speed evidence
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["OUTPUT_DIR"]) / "stage7_lco2_hem_equilibrium_sound_speed.json"
          payload = json.loads(path.read_text(encoding="utf-8"))
          assert payload["scope"] == "verification_only"
          assert payload["production_solver_connected"] is False
          assert payload["production_cfl_connected"] is False
          assert payload["production_flux_connected"] is False
          assert payload["equilibrium_two_phase_sound_speed_closure_approved"] is False
          assert payload["coolprop_two_phase_sound_speed_requested"] is False
          assert payload["physical_validation"] is False
          assert payload["design_use_acceptance"] is False
          rows = payload["results"]
          assert len(rows) == 10
          assert all(row["estimated_equilibrium_sound_speed_m_s"] > 0.0 for row in rows)
          assert all(row["coolprop_two_phase_sound_speed_requested"] is False for row in rows)
          two_phase = [row for row in rows if row["phase_class"] == "liquid_vapor_two_phase"]
          single_phase = [row for row in rows if row["phase_class"] != "liquid_vapor_two_phase"]
          assert len(two_phase) == 7
          assert all(row["single_phase_reference_evaluated"] is False for row in two_phase)
          assert all(row["single_phase_reference_relative_error"] is None for row in two_phase)
          assert all(row["single_phase_reference_evaluated"] is True for row in single_phase)
          assert all(row["single_phase_reference_relative_error"] < 1.0e-2 for row in single_phase)
          print([(row["case_id"], row["estimated_equilibrium_sound_speed_m_s"]) for row in rows])
          PY

      - name: Run full repository suite
        run: python -m pytest -q --junitxml=artifacts/stage7-hem-sound-speed-full-junit.xml

      - name: Check committed diff
        run: |
          git diff --check origin/agent/stage7-lco2-hem-phase-classification...HEAD
          git diff --check origin/main...HEAD

      - name: Confirm tracked and staged files remain unchanged
        run: |
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload sound-speed evidence
        uses: actions/upload-artifact@v7
        with:
          name: stage7-lco2-hem-equilibrium-sound-speed
          path: |
            artifacts/stage7-hem-sound-speed-focused-junit.xml
            artifacts/stage7-hem-sound-speed-full-junit.xml
            ${{ runner.temp }}/stage7_lco2_hem_equilibrium_sound_speed
          if-no-files-found: error
          retention-days: 14
