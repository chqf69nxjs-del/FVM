name: V-013C Review-Ready Validation

on:
  push:
    branches:
      - agent/stage7-v013c-fixed-pressure-reflection
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: v013c-review-ready-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-review-ready:
    if: ${{ !contains(github.event.head_commit.message || '', '[v013c-review-ready]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: src
      MPLBACKEND: Agg
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v7
        with:
          ref: agent/stage7-v013c-fixed-pressure-reflection
          fetch-depth: 0

      - name: Detect finalized observation
        id: finalized
        shell: bash
        run: |
          if [[ -f docs/verification/stage7_v013c_fixed_pressure_reflection_observation_notes.md ]] \
             && grep -q 'OBSERVED; READY FOR REVIEW' docs/verification/stage7_v013c_fixed_pressure_reflection_observation_notes.md; then
            echo 'ready=true' >> "$GITHUB_OUTPUT"
          else
            echo 'ready=false' >> "$GITHUB_OUTPUT"
            echo 'Final observation documentation is not committed yet; this push is not the review-ready head.'
          fi

      - name: Set up Python
        if: steps.finalized.outputs.ready == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        if: steps.finalized.outputs.ready == 'true'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pytest "CoolProp==8.0.0" "matplotlib>=3.7"

      - name: Check final committed diff and cleanup
        if: steps.finalized.outputs.ready == 'true'
        shell: bash
        run: |
          git fetch --no-tags origin main
          git diff --check origin/main...HEAD
          test -z "$(find .github/workflows -maxdepth 1 -type f -name 'v013c-temporary-*.yml' -print)"
          test -z "$(find docs/verification -maxdepth 1 -type f -name '.v013c*' -print)"
          test -z "$(find scripts -maxdepth 1 -type f -name 'v013c_*' -print 2>/dev/null || true)"

      - name: Run focused V-013C tests
        if: steps.finalized.outputs.ready == 'true'
        shell: bash
        run: |
          python -m pytest -q \
            tests/test_linear_acoustic_reference.py \
            tests/test_v013_fixed_pressure_reflection.py \
            tests/test_v013_fixed_pressure_observation.py \
            --strict-markers

      - name: Run full repository tests
        if: steps.finalized.outputs.ready == 'true'
        shell: bash
        run: |
          python -m pytest -q --strict-markers

      - name: Mark PR ready and request final review
        if: steps.finalized.outputs.ready == 'true'
        shell: bash
        run: |
          gh pr ready 50 --repo "$GITHUB_REPOSITORY"
          gh pr comment 50 --repo "$GITHUB_REPOSITORY" --body '@codex review

Please review the final V-013C fixed-pressure reflection head. Focus on the negative pressure / positive velocity reflection identities, boundary-pressure residual and velocity amplification metrics, treatment of nonzero pressure-boundary mass and energy flux as observations, finite error normalizations, saved-artifact-only seven-figure plotting, traceability, temporary-file cleanup, and confirm there is no production solver, flux, EOS-inversion, or boundary-behaviour change and no premature acceptance band.'

      - name: Remove validation helper
        if: steps.finalized.outputs.ready == 'true'
        shell: bash
        run: |
          rm -f .github/workflows/v013c-review-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m '[v013c-review-ready] Remove final validation helper'
          git push origin HEAD:agent/stage7-v013c-fixed-pressure-reflection
