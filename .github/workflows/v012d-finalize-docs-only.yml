name: V-012D Finalize Docs Only

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage6-v012d-closing-ramp
          fetch-depth: 0
      - name: Extract synchronized documentation payload
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          workflow = Path('.github/workflows/v012d-finalize-documentation.yml')
          text = workflow.read_text(encoding='utf-8')
          start = text.index('          H4sI')
          end = text.index('\n          DOCS_B64', start)
          payload = ''.join(text[start:end].split())
          Path('/tmp/v012d-docs.tgz').write_bytes(base64.b64decode(payload))
          PY
          tar -xzf /tmp/v012d-docs.tgz
      - name: Commit synchronized documentation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            docs/verification/MASTER_VERIFICATION_INDEX.md \
            docs/verification/stage6_execution_log.md \
            docs/verification/stage6_v012_execution_log.md \
            docs/verification/stage6_v012d_closing_ramp_observation_notes.md
          git diff --cached --check
          git commit -m 'Document V-012D closing-ramp observation'
          git push origin HEAD:agent/stage6-v012d-closing-ramp
